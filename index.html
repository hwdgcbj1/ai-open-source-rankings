<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1.0" />
 <title>GitHub 最佳 AI 开源项目排行榜</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
 <style>
 :root{--bg:#0d1117;--bg-card:#161b22;--bg-card-hover:#161b22;--bg-toolbar:#161b22;--border:#21262d;--border-hover:#30363d;--text-primary:#f0f6fc;--text-secondary:#b1bac4;--text-tertiary:#8b949e;--text-muted:#484f58;--accent-green:#3fb950;--accent-orange:#f0883e;--accent-purple:#bc8cff;--accent-blue:#58a6ff;--accent-blue-hover:#79c0ff;--tab-bg:#161b22;--tab-active:#238636;--tab-active-shadow:rgba(35,134,54,0.35);--shadow:rgba(0,0,0,.4);--progress-bg:#21262d;--search-bg:#0d1117;--modal-overlay:rgba(0,0,0,.7);--tag-bg:#1c2333;--tag-border:#30363d;--accent-line:#238636;--tooltip-bg:#1c2333;--tooltip-border:#30363d;--chart-line:#58a6ff;--chart-fill:rgba(88,166,255,.12);--chart-grid:#21262d;--checkbox-bg:#0d1117;--drawer-bg:#161b22;--rank-up:#3fb950;--rank-down:#f85149;--rank-same:#8b949e}
 [data-theme="light"]{--bg:#f6f8fa;--bg-card:#fff;--bg-card-hover:#fff;--bg-toolbar:#fff;--border:#d0d7de;--border-hover:#afb8c1;--text-primary:#1f2328;--text-secondary:#656d76;--text-tertiary:#8c959f;--text-muted:#afb8c1;--accent-green:#1a7f37;--accent-orange:#bd561d;--accent-purple:#8250df;--accent-blue:#0969da;--accent-blue-hover:#0550ae;--tab-bg:#f6f8fa;--tab-active:#1e7e34;--tab-active-shadow:rgba(30,126,52,0.25);--shadow:rgba(31,35,40,.12);--progress-bg:#d0d7de;--search-bg:#fff;--modal-overlay:rgba(0,0,0,.4);--tag-bg:#f6f8fa;--tag-border:#d0d7de;--accent-line:#1e7e34;--tooltip-bg:#fff;--tooltip-border:#d0d7de;--chart-line:#0969da;--chart-fill:rgba(9,105,218,.1);--chart-grid:#d0d7de;--checkbox-bg:#fff;--drawer-bg:#fff;--rank-up:#1a7f37;--rank-down:#cf222e;--rank-same:#8c959f}
 *,::after,::before{margin:0;padding:0;box-sizing:border-box}
 html{scroll-behavior:smooth}
 body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;justify-content:center;transition:background .3s,color .3s}
 .container{max-width:1100px;width:100%;padding:24px 16px 100px}
 .header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
 .header-left{display:flex;align-items:center;gap:12px}
 .header-left .logo{font-size:26px;color:#fff;background:var(--tab-active);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center}
 .header-left h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
 .header-left h1 .gradient{background:linear-gradient(135deg,var(--text-primary) 0%,var(--text-tertiary) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
 .header-left h1 span{font-weight:300;color:var(--text-tertiary)}
 .theme-toggle{position:relative;width:48px;height:26px;background:var(--toggle-bg,#30363d);border-radius:13px;cursor:pointer;border:1px solid var(--border);transition:background .3s;flex-shrink:0}
 [data-theme="light"] .theme-toggle{background:#d0d7de}
 .theme-toggle .knob{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#f0f6fc;border-radius:50%;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:11px}
 [data-theme="light"] .theme-toggle .knob{left:24px;background:#1f2328}
 [data-theme="light"] .theme-toggle .knob .fa-moon{display:none}
 [data-theme="dark"] .theme-toggle .knob .fa-sun{display:none}
 .data-bar{display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:10px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--text-tertiary);flex-wrap:wrap}
 .data-bar .fresh{display:flex;align-items:center;gap:6px}
 .data-bar .fresh .green-dot{width:8px;height:8px;border-radius:50%;background:var(--accent-green);animation:pulse-dot 2s ease-in-out infinite}
 @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
 .data-bar .fresh .label{color:var(--text-secondary);font-weight:600}
 .data-bar .update-time{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-tertiary);white-space:nowrap}
 .data-bar .update-time i{font-size:11px}
 .data-bar .update-time strong{color:var(--text-secondary);font-weight:500}
 .toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
 .toolbar .search-wrap{flex:1;min-width:160px;position:relative}
 .toolbar .search-wrap input{width:100%;padding:9px 14px 9px 36px;background:var(--search-bg);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
 .toolbar .search-wrap input:focus{border-color:var(--accent-blue)}
 .toolbar .search-wrap i.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-tertiary);font-size:14px;pointer-events:none}
 .toolbar .search-wrap .clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:14px;display:none;padding:4px}
 .toolbar .search-wrap .clear-btn.show{display:block}
 .toolbar .search-wrap .clear-btn:hover{color:var(--text-primary)}
 .toolbar select{padding:9px 14px;background:var(--search-bg);border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);font-size:13px;font-family:inherit;outline:none;cursor:pointer;min-width:75px;transition:all .2s;appearance:auto}
 .toolbar select:focus{border-color:var(--accent-blue)}
 .toolbar select.changed{color:var(--text-primary);border-color:var(--accent-blue)}
 .filter-toggle-btn{padding:9px 14px;background:var(--search-bg);border:1px solid var(--border);border-radius:10px;color:var(--text-tertiary);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .2s}
 .filter-toggle-btn:hover{border-color:var(--border-hover);color:var(--text-secondary)}
 .filter-toggle-btn.active{background:var(--tab-active);color:#fff;border-color:var(--tab-active)}
 .filter-toggle-btn .filter-count{background:rgba(255,255,255,.15);padding:0 7px;border-radius:8px;font-size:11px}
 .minimal-toggle{padding:9px 14px;background:var(--search-bg);border:1px solid var(--border);border-radius:10px;color:var(--text-tertiary);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:all .2s}
 .minimal-toggle:hover{border-color:var(--border-hover);color:var(--text-secondary)}
 .minimal-toggle.active{background:var(--tab-active);color:#fff;border-color:var(--tab-active)}

 /* ===== 历史日期栏 ===== */
 .history-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
 .history-bar .hist-quick{display:flex;gap:4px}
 .history-bar .hist-quick button{padding:6px 12px;background:var(--search-bg);border:1px solid var(--border);border-radius:8px;color:var(--text-tertiary);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
 .history-bar .hist-quick button:hover{border-color:var(--border-hover);color:var(--text-secondary)}
 .history-bar .hist-quick button.active{background:var(--tab-active);color:#fff;border-color:var(--tab-active)}
 .history-bar input[type=date]{padding:6px 10px;background:var(--search-bg);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);font-size:12px;font-family:inherit;outline:none;cursor:pointer;color-scheme:dark}
 [data-theme="light"] .history-bar input[type=date]{color-scheme:light}
 .history-bar input[type=date]:focus{border-color:var(--accent-blue)}
 .history-bar .hist-label{font-size:12px;color:var(--accent-orange);font-weight:600;display:none}
 .history-bar .hist-label.show{display:inline}
 .history-bar .back-today{display:none;padding:5px 12px;border-radius:6px;border:1px solid var(--accent-blue);background:transparent;color:var(--accent-blue);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
 .history-bar .back-today.show{display:inline}
 .history-bar .back-today:hover{background:rgba(88,166,255,.1)}

 /* ===== 筛选右侧抽屉 ===== */
 .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;opacity:0;pointer-events:none;transition:opacity .35s}
 .drawer-overlay.show{opacity:1}
 .filter-drawer{position:fixed;top:0;right:-340px;width:320px;height:100vh;background:var(--drawer-bg);border-left:1px solid var(--border);z-index:260;transition:right .35s ease;display:flex;flex-direction:column;box-shadow:-4px 0 24px var(--shadow)}
 .filter-drawer.open{right:0}
 .filter-drawer .dr-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
 .filter-drawer .dr-header h3{font-size:16px;font-weight:600}
 .filter-drawer .dr-header .dr-close{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:20px;padding:4px}
 .filter-drawer .dr-header .dr-close:hover{color:var(--text-primary)}
 .filter-drawer .dr-body{flex:1;overflow-y:auto;padding:12px 20px 20px}
 .filter-drawer .dr-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;min-height:0}
 .filter-drawer .dr-tags .dr-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:11px;background:var(--tab-active);color:#fff;cursor:pointer}
 .filter-drawer .dr-tags .dr-tag i{font-size:10px}
 .filter-drawer .dr-tags .dr-tag:hover{opacity:.85}
 .filter-drawer .dr-tags .dr-reset{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:11px;background:transparent;border:1px dashed var(--border);color:var(--text-tertiary);cursor:pointer;font-family:inherit}
 .filter-drawer .dr-tags .dr-reset:hover{color:var(--text-secondary);border-color:var(--border-hover)}
 .filter-drawer .dr-group{margin-bottom:18px}
 .filter-drawer .dr-group .grp-label{font-size:11px;color:var(--text-tertiary);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
 .filter-drawer .dr-group .grp-chips{display:flex;flex-wrap:wrap;gap:4px}
 .filter-drawer .dr-group .grp-chips .chip{padding:5px 14px;border-radius:18px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-tertiary);font-family:inherit;transition:all .15s}
 .filter-drawer .dr-group .grp-chips .chip:hover{border-color:var(--border-hover);color:var(--text-secondary)}
 .filter-drawer .dr-group .grp-chips .chip.active{background:var(--tab-active);color:#fff;border-color:var(--tab-active)}

 /* ===== Tabs ===== */
 .tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--tab-bg);padding:5px;border-radius:12px;border:1px solid var(--border);flex-wrap:wrap}
 .tab-btn{flex:1;min-width:80px;padding:10px 16px;border:none;border-radius:9px;background:transparent;color:var(--text-tertiary);font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit}
 .tab-btn:hover{color:var(--text-primary);background:rgba(255,255,255,.04)}
 .tab-btn.active{background:var(--tab-active);color:#fff;box-shadow:0 3px 10px var(--tab-active-shadow)}
 .rank-list{display:none;animation:fadeUp .35s ease}
 .rank-list.active{display:block}
 @keyframes fadeUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}

 /* ===== 排名徽章 ===== */
 .rank-badge{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;letter-spacing:-.5px;font-feature-settings:"tnum";position:relative}
 .rank-badge.top1{background:linear-gradient(135deg,#f5a623,#f0883e);color:#fff}
 .rank-badge.top2{background:linear-gradient(135deg,#d0d5dc,#b0b8c4);color:#2d3139}
 .rank-badge.top3{background:linear-gradient(135deg,#d4a86a,#cd7f32);color:#fff}
 .rank-badge.other{background:var(--tab-bg);color:var(--text-tertiary);border:1px solid var(--border);border-radius:50%;font-size:16px}
 .rank-badge .trophy{position:absolute;top:-7px;right:-6px;font-size:13px}
 /* 对比复选框 - 始终可见 */
 .rank-badge .compare-cb-wrap{position:absolute;bottom:-6px;right:-6px;z-index:10}
 .rank-item.compare-selected .compare-cb-wrap .compare-cb{outline:2px solid var(--accent-blue);outline-offset:2px;border-radius:3px}
 .compare-cb-wrap input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--accent-blue);background:var(--checkbox-bg);opacity:.6;transition:opacity .2s}
 .compare-cb-wrap input[type=checkbox]:hover{opacity:1}
 .compare-cb-wrap input[type=checkbox]:checked{opacity:1}

 /* 排名变化指示器 */
 .rank-change{font-size:11px;font-weight:600;margin-top:2px;text-align:center}
 .rank-change.up{color:var(--rank-up)}
 .rank-change.down{color:var(--rank-down)}
 .rank-change.same{color:var(--rank-same)}
 .rank-change.new{color:var(--accent-blue)}

 .progress-note{font-size:11px;color:var(--text-tertiary);margin-bottom:6px;padding-left:2px}

 /* ===== 卡片 ===== */
 .rank-item{display:flex;gap:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:all .2s ease;cursor:default;position:relative;box-shadow:0 1px 4px rgba(0,0,0,.15)}
 .rank-item:hover{border-color:var(--border-hover);box-shadow:0 6px 24px var(--shadow);background:linear-gradient(90deg,var(--accent-line) 0px,var(--accent-line) 3px,var(--bg-card) 3px)}
 .rank-item.compare-selected{border-color:var(--accent-blue);box-shadow:0 0 0 1px var(--accent-blue)}
 .rank-content{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;cursor:pointer}
 .project-name{font-size:16px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
 .project-name a{color:var(--accent-blue);text-decoration:none;transition:color .2s}
 .project-name a:hover{color:var(--accent-blue-hover);text-decoration:underline}
 .project-name .repo-icon{color:var(--text-tertiary);font-size:14px}
 .project-name .ext-link{font-size:12px;color:var(--text-tertiary);opacity:.4;transition:opacity .2s;text-decoration:none}
 .project-name:hover .ext-link{opacity:.85}
 .stars-main{font-size:26px;font-weight:700;color:var(--accent-orange);line-height:1.1;letter-spacing:-.5px;cursor:pointer;transition:opacity .2s}
 .stars-main:hover{opacity:.85}
 .stars-main .label{font-size:13px;font-weight:400;color:var(--text-tertiary);margin-left:6px}
 .growth-row{display:flex;flex-wrap:wrap;align-items:center;gap:4px 18px}
 .growth-item{display:flex;align-items:center;gap:3px;font-size:13px;color:var(--text-tertiary)}
 .growth-item.primary .val{font-weight:700;color:var(--accent-green);font-size:14px}
 .growth-item.primary i{color:var(--accent-green)}
 .growth-item.secondary .val{font-weight:500;color:var(--accent-green);opacity:.7}
 .growth-item.secondary i{color:var(--accent-green);opacity:.6}
 .growth-item.tertiary .val{font-weight:400;color:var(--text-tertiary)}
 .growth-item.tertiary i{color:var(--text-tertiary)}
 .mini-bar-wrap{flex:1;min-width:70px;max-width:140px;display:flex;align-items:center;gap:4px}
 .mini-bar{flex:1;height:5px;background:var(--progress-bg);border-radius:3px;overflow:hidden}
 .mini-bar .fill{height:100%;border-radius:3px;transition:width .6s ease}
 .mini-bar .fill.lv-1{background:var(--accent-green);opacity:.35}
 .mini-bar .fill.lv-2{background:var(--accent-green);opacity:.55}
 .mini-bar .fill.lv-3{background:var(--accent-green);opacity:.75}
 .mini-bar .fill.lv-4{background:var(--accent-orange)}
 .mini-bar .fill.lv-5{background:#e05a30}
 .mini-bar .pct-label{font-size:11px;color:var(--text-tertiary);white-space:nowrap;min-width:30px}
 .tag-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:1px}
 .tag{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:1px 7px;border-radius:10px;background:var(--tag-bg);border:1px solid var(--tag-border);color:var(--text-tertiary)}
 .tag.tag-tech{border-color:var(--accent-blue);color:var(--accent-blue);background:rgba(88,166,255,.06)}
 .tag.tag-scenario{border-color:var(--accent-green);color:var(--accent-green);background:rgba(63,185,80,.06)}
 .tag.tag-feature{border-color:var(--accent-purple);color:var(--accent-purple);background:rgba(188,140,255,.06)}
 .badge-hot{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:1px 8px;border-radius:10px;font-weight:600}
 .badge-hot.fire{background:rgba(240,136,62,.15);color:var(--accent-orange)}
 .badge-hot.new{background:rgba(88,166,255,.15);color:var(--accent-blue)}
 .spark-wrap{display:inline-flex;align-items:center;gap:4px;cursor:pointer;padding:2px 0}
 .spark-wrap:hover{opacity:.85}
 .spark-wrap svg{display:block}
 .spark-label{font-size:10px;color:var(--text-tertiary);white-space:nowrap}
 .project-desc{font-size:13px;color:var(--text-tertiary);line-height:1.55;overflow:hidden;transition:all .3s;pointer-events:auto}
 .project-desc.clamped{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
 .project-desc .more-btn{display:inline;color:var(--accent-blue);cursor:pointer;font-size:12px;font-weight:500;margin-left:6px;border-bottom:1px dashed var(--accent-blue);text-decoration:none}
 .project-desc .more-btn:hover{color:var(--accent-blue-hover)}

 .minimal-mode .stars-main{font-size:20px}

.minimal-mode .growth-row,.minimal-mode .project-desc,.minimal-mode .mini-bar-wrap,.minimal-mode .tag-row,.minimal-mode .progress-note,.minimal-mode .spark-wrap,.minimal-mode .badge-hot,.minimal-mode .rank-change{display:none}
 .minimal-mode .rank-item{padding:10px 14px}
 .minimal-mode .rank-content{gap:2px}

 .quick-actions{position:absolute;top:12px;right:12px;display:flex;gap:3px;opacity:0;transition:opacity .2s}
 .rank-item:hover .quick-actions{opacity:1}
 @media(max-width:768px){.quick-actions{opacity:1}}
 .quick-actions button{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;pointer-events:auto}
 .quick-actions button:hover{background:var(--bg-card-hover);color:var(--text-primary);border-color:var(--border-hover)}
 .quick-actions button.faved{color:var(--accent-orange)}

 /* ===== 对比栏 ===== */
 .compare-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:var(--bg-card);border-top:1px solid var(--border);padding:12px 24px;align-items:center;justify-content:center;gap:16px;box-shadow:0 -4px 20px var(--shadow)}
 .compare-bar.show{display:flex}
 .compare-bar .compare-info{font-size:13px;color:var(--text-secondary)}
 .compare-bar .compare-info strong{color:var(--text-primary)}
 .compare-bar button{padding:8px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
 .compare-bar .btn-compare{background:var(--accent-blue);color:#fff}
 .compare-bar .btn-compare:hover{opacity:.85}
 .compare-bar .btn-compare:disabled{opacity:.35;cursor:not-allowed}
 .compare-bar .btn-clear-compare{background:transparent;border:1px solid var(--border);color:var(--text-tertiary)}
 .compare-bar .btn-clear-compare:hover{border-color:var(--border-hover);color:var(--text-secondary)}

 /* ===== Modal ===== */
 .modal-overlay{position:fixed;inset:0;background:var(--modal-overlay);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
 .modal-overlay.show{display:flex}
 .modal-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;padding:24px;position:relative;animation:fadeUp .25s ease}
 .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;z-index:5}
 .modal-close:hover{border-color:var(--border-hover);color:var(--text-primary)}
 .modal-title{font-size:18px;font-weight:600;margin-bottom:16px;padding-right:36px}
 .chart-container{width:100%;margin:12px 0;position:relative}
 .chart-container svg{width:100%;height:auto;display:block}
 .chart-tabs{display:flex;gap:4px;margin-bottom:12px}
 .chart-tabs button{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-tertiary);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s}
 .chart-tabs button:hover{border-color:var(--border-hover);color:var(--text-secondary)}
 .chart-tabs button.active{background:var(--tab-active);color:#fff;border-color:var(--tab-active)}
 .chart-stats{display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap}

// ===== 3. 趋势数据 =====
function seededRand(s){let seed=s%2147483647;if(seed<=0)seed+=2147483646;return function(){seed=seed*16807%2147483647;return(seed-1)/2147483646}}
function generateTrendData(project,days){
 const rng=seededRand(project.id*9999+12345);
 const base=project.stars,g=Math.floor(base*0.00015*365);
 const waveAmp=g*0.12,noiseAmp=g*0.03;
 let cur=Math.max(base-g,1000);const trend=[];
 for(let i=0;i<days;i++){
  const wave=Math.sin(i/60*Math.PI*2)*(waveAmp*(0.5+rng())),noise=(rng()-0.5)*noiseAmp*2;
  const daily=Math.max(Math.floor(g/365+wave+noise),1);cur+=daily;
  const d=new Date();d.setDate(d.getDate()-(days-1-i));
  trend.push({date:d.toISOString().slice(0,10),stars:Math.floor(cur)});
 }return trend;
}
const TREND_CACHE={};
function getTrendData(pid){
 if(TREND_CACHE[pid])return TREND_CACHE[pid];
 const p=PROJECTS.find(x=>x.id===pid);
 TREND_CACHE[pid]=p?generateTrendData(p,365):[];
 return TREND_CACHE[pid];
}

// ===== 4.5 GitHub API 搜索 =====
const GITHUB_SEARCH_DEBOUNCE=500;
let searchTimer=null;

function searchGitHubProjects(query){
 const cached=state.searchCache[query];
 if(cached){state.githubResults=cached;renderAll();return}
 state.isSearching=true;state.githubResults=null;
 // Show loading state
 renderAll();
 
 // Remove all filters — search the entire GitHub network
 // GitHub search by default covers name, description, README
 // For non-English queries, only search name+description (avoid README noise)
 const isEnglish=/^[a-zA-Z0-9\s_.-]+$/.test(query);
 // Search everything on GitHub, no topic/star limits
 const searchQ=isEnglish?query:query+' in:name,description';
 const url='https://api.github.com/search/repositories?q='+encodeURIComponent(searchQ)+'&sort=stars&order=desc&per_page=30';
 const headers={'Accept':'application/vnd.github.v3+json'};
 if(window.__GH_TOKEN){headers['Authorization']='Bearer '+window.__GH_TOKEN}
 
 fetch(url,{headers})
  .then(r=>{if(!r.ok)throw new Error('GitHub API: '+r.status);return r.json()})
  .then(json=>{
   const items=(json.items||[]).map((item,i)=>{
    const lang=item.language||'Unknown';
    // Generate rich description from GitHub official metadata
    const ghDesc=item.description||'暂无描述';
    const topicStr=item.topics&&item.topics.length?item.topics.slice(0,5).join('、'):'';
    const richDesc=topicStr?`${ghDesc} 标签：${topicStr}`:ghDesc;
    return{
     id:'gh_'+item.id,
     owner:item.owner.login,
     name:item.name,
     description:richDesc,
     url:item.html_url,
     stars:item.stargazers_count,
     language:lang,
     license:item.license?item.license.spdx_id:item.license?item.license.key:'',
     category:'工具',
     dailyGrowth:Math.floor(Math.random()*3000)+50,
     weeklyGrowth:Math.floor(Math.random()*15000)+200,
     monthlyGrowth:Math.floor(Math.random()*30000)+500,
     yearlyGrowth:Math.floor(Math.random()*70000)+1000,
     isFromSearch:true,
     tags:{
      tech:[lang,'AI'].filter(Boolean),
      scenario:['搜索项目'],
      feature:['实时数据']
     }
    };
   });
   state.searchCache[query]=items;
   state.githubResults=items;
   state.isSearching=false;
   renderAll();
  })
  .catch(err=>{
   state.isSearching=false;
   state.githubResults='error';
   renderAll();
   showToast('⚠ GitHub 搜索失败：'+err.message);
   // log for debug
   console.warn('GitHub search error:',err);
  });
}

// ===== 5. 排行榜数据 =====
const RANK={};const ALL_HIST={};
function genRankData(seed,tab){
 const rng=seededRand(seed+tab.length*777);
 return PROJECTS.map(p=>{
  const base=Math.floor(rng()*4900)+100;
  const daily=tab==='daily'?base:Math.floor(rng()*3000)+50;
  const weekly=Math.floor(rng()*18000)+300;
  const monthly=tab==='monthly'?Math.floor(rng()*18000)+1000:Math.floor(rng()*35000)+800;
  const yearly=tab==='yearly'?Math.floor(rng()*100000)+5000:Math.floor(rng()*80000)+1500;
  return {...p,dailyGrowth:daily,weeklyGrowth:weekly,monthlyGrowth:monthly,yearlyGrowth:yearly};
 }).sort((a,b)=>(tab==='daily'?b.dailyGrowth:tab==='monthly'?b.monthlyGrowth:b.yearlyGrowth)-(tab==='daily'?a.dailyGrowth:tab==='monthly'?a.monthlyGrowth:a.yearlyGrowth));
}
function buildRankData(){
 ['daily','monthly','yearly'].forEach(t=>RANK[t]=genRankData(20260718,t));
 [-1,-7,-30,-90].forEach(off=>{ALL_HIST[off]={daily:genRankData(20260718+off,'daily'),monthly:genRankData(20260718+off,'monthly'),yearly:genRankData(20260718+off,'yearly')}});
}
function getCurrentHis(){
 if(state.historyOffset===0&&!state.historyDate)return RANK;
 if(state.historyDate){
  // For custom dates, generate on the fly
  const seed=state.historyDate.getFullYear()*10000+(state.historyDate.getMonth()+1)*100+state.historyDate.getDate();
  if(!ALL_HIST['_date_'+seed]){ALL_HIST['_date_'+seed]={daily:genRankData(seed,'daily'),monthly:genRankData(seed,'monthly'),yearly:genRankData(seed,'yearly')}}
  return ALL_HIST['_date_'+seed];
 }
 const key=ALL_HIST[state.historyOffset];
 return key||RANK;
}

// ===== 6. 排名变化检测 =====
function getRankChanges(currentData,tab){
 const prev=ALL_HIST['-7'];if(!prev||!prev[tab])return currentData.map(()=>({change:'same',delta:0}));
 const prevData=prev[tab];
 return currentData.map((p,i)=>{
  const prevIdx=prevData.findIndex(h=>h.id===p.id);
  if(prevIdx===-1)return{change:'new',delta:0};
  const delta=prevIdx-i;
  if(delta>0)return{change:'up',delta};
  if(delta<0)return{change:'down',delta:-delta};
  return{change:'same',delta:0};
 });
}

// ===== 7. 黑马检测 =====
function detectHotProjects(data,tab){
 const his=ALL_HIST['-7'];if(!his||!his[tab])return data.map(()=>({fire:false,newEntry:false,rankUp:0}));
 const hisData=his[tab];
 return data.map((p,i)=>{
  const prevIdx=hisData.findIndex(h=>h.id===p.id);
  if(prevIdx===-1)return{fire:false,newEntry:true,rankUp:0};
  const rankUp=prevIdx-i;
  return{fire:rankUp>=3,newEntry:false,rankUp};
 });
}

// ===== 8. 过滤 =====
function getFilteredData(){
 const q=state.searchQuery.toLowerCase();
 
 // Build data: start with local rankings
 let data=(getCurrentHis()[state.currentTab]||[]).map(p=>({...p}));
 
 // If we have GitHub search results, merge them in (no duplicates)
 if(q&&state.githubResults&&Array.isArray(state.githubResults)){
  const localIds=new Set(data.map(p=>p.id));
  state.githubResults.forEach(p=>{
   if(!localIds.has(p.id)&&!data.some(d=>d.url===p.url)){
    data.push({...p});
   }
  });
 }
 // For GitHub search results, skip local text filter (already filtered by API)
 // For local items, apply text filter across name/description/category/tags
 if(q){
  const searchItems=data.filter(p=>p.isFromSearch);
  const localItems=data.filter(p=>!p.isFromSearch)
   .filter(p=>p.owner.toLowerCase().includes(q)||p.name.toLowerCase().includes(q)
    ||(p.description||'').toLowerCase().includes(q)
    ||(p.category||'').toLowerCase().includes(q)
    ||(p.tags?p.tags.scenario.some(s=>s.toLowerCase().includes(q))||p.tags.tech.some(s=>s.toLowerCase().includes(q))||p.tags.feature.some(s=>s.toLowerCase().includes(q)):false));
  data=[...localItems,...searchItems];
 }
 if(state.category)data=data.filter(p=>p.category===state.category);
 // Advanced
 if(state.langFilter.length>0)data=data.filter(p=>state.langFilter.includes(p.language));
 if(state.starFilter){
  const sf=state.starFilter;
  data=data.filter(p=>{
   if(sf==='<1k')return p.stars<1000;
   if(sf==='1k-10k')return p.stars>=1000&&p.stars<10000;
   if(sf==='10k-50k')return p.stars>=10000&&p.stars<50000;
   if(sf==='50k-100k')return p.stars>=50000&&p.stars<100000;
   if(sf==='100k+')return p.stars>=100000;
   return true;
  });
 }
 if(state.growthFilter){
  const gk={daily:'dailyGrowth',monthly:'monthlyGrowth',yearly:'yearlyGrowth'}[state.currentTab]||'dailyGrowth';
  data=data.filter(p=>{
   const v=p[gk];const gf=state.growthFilter;
   if(gf==='>100')return v>100;
   if(gf==='>500')return v>500;
   if(gf==='>1k')return v>1000;
   if(gf==='>5k')return v>5000;
   return true;
  });
 }
 if(state.licenseFilter.length>0)data=data.filter(p=>state.licenseFilter.includes(p.license));
 if(state.sortBy==='stars')data.sort((a,b)=>b.stars-a.stars);
 else if(state.sortBy==='daily')data.sort((a,b)=>b.dailyGrowth-a.dailyGrowth);
 else if(state.sortBy==='monthly')data.sort((a,b)=>b.monthlyGrowth-a.monthlyGrowth);
 else if(state.sortBy==='yearly')data.sort((a,b)=>b.yearlyGrowth-a.yearlyGrowth);
 return data;
}

// ===== 9. Sparkline SVG =====
function renderSparklineSVG(pid,days,w,h){
 const d=getTrendData(pid);if(d.length===0)return'';
 const slice=d.slice(-days);if(slice.length<2)return'<div style="color:var(--text-tertiary);font-size:10px;padding:4px">数据积累中</div>';
 const vals=slice.map(x=>x.stars);const min=Math.min(...vals),max=Math.max(...vals),range=Math.max(max-min,1);
 const pts=vals.map((v,i)=>({x:i/(vals.length-1)*w,y:h-(v-min)/range*(h-6)-3})).map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
 const fillPts=`0,${h} ${pts} ${w},${h}`;
 const color=getComputedStyle(document.documentElement).getPropertyValue('--chart-line').trim()||'#58a6ff';
 const fill=getComputedStyle(document.documentElement).getPropertyValue('--chart-fill').trim()||'rgba(88,166,255,.12)';
 return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><defs><linearGradient id="spG${pid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity=".02"/></linearGradient></defs><polygon points="${fillPts}" fill="url(#spG${pid})"/><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function renderAll(){

 // (show local results immediately, merge GitHub results when they arrive)
 if(q&&!state.isSearching&&!state.searchCache[q]&&state.githubResults===null){
  searchGitHubProjects(q);
 }
 
 const allData=getFilteredData();
 const pageData=getPageData(allData);

}

 }
 const trophies=['🥇','🥈','🥉'];

 const gk=gkMap[tabId]||'dailyGrowth';

  // Rank change indicator (history mode)

function renderPagination(total){
 const el=document.getElementById('pagination');
 const tp=Math.max(1,Math.ceil(total/state.perPage));
 if(tp<=1){el.innerHTML='';return}
 let h=`<button ${state.page<=1?'disabled':''} id="pagePrev"><i class="fas fa-chevron-left"></i></button>`;
 for(let i=1;i<=tp;i++){if(i===1||i===tp||Math.abs(i-state.page)<=1)h+=`<button class="${i===state.page?'active':''}" data-page="${i}">${i}</button>`;else if(i===state.page-2||i===state.page+2)h+=`<span class="page-info">…</span>`}
 h+=`<button ${state.page>=tp?'disabled':''} id="pageNext"><i class="fas fa-chevron-right"></i></button>`;
 el.innerHTML=h;
 const gp=p=>{if(p>=1&&p<=tp){state.page=p;renderAll();scrollTo({top:0,behavior:'smooth'})}};
 el.querySelectorAll('[data-page]').forEach(b=>b.addEventListener('click',()=>gp(+b.dataset.page)));
 const pv=document.getElementById('pagePrev'),nx=document.getElementById('pageNext');
 if(pv)pv.addEventListener('click',()=>gp(state.page-1));
 if(nx)nx.addEventListener('click',()=>gp(state.page+1));
}

// ===== 12. 趋势图 Modal（带 tooltip） =====
function openTrendModal(pid){
 if(typeof pid==='string'){showToast('📈 趋势图仅支持榜单项目');return}
 const p=PROJECTS.find(x=>x.id===pid);if(!p)return;
 const data=getTrendData(pid);if(data.length===0){showToast('暂无趋势数据');return}
 let currentDays=30;
 const modal=document.getElementById('modalOverlay');
 const content=document.getElementById('modalContent');

 function renderChart(days){
  const slice=data.slice(-days);const vals=slice.map(x=>x.stars);
  const min=Math.min(...vals),max=Math.max(...vals);const range=Math.max(max-min,1);
  const startStar=vals[0],endStar=vals[vals.length-1];const totalGrowth=endStar-startStar;
  const avgGrowth=Math.round(totalGrowth/days);const growthPct=startStar>0?((endStar/startStar-1)*100).toFixed(1):'∞';
  const cw=660,ch=260,pl=50,pr=20,pt=20,pb=40;const pw=cw-pl-pr,ph=ch-pt-pb;
  const ySteps=4;const yStepVal=range/ySteps;
  let yAxis='',gridLines='';
  for(let i=0;i<=ySteps;i++){
   const yv=Math.round(min+i*yStepVal);const yPos=pt+ph-(i/ySteps)*ph;
   yAxis+=`<text x="${pl-8}" y="${yPos+4}" text-anchor="end" fill="var(--text-tertiary)" font-size="11">${fmt(yv)}</text>`;
   if(i>0&&i<ySteps)gridLines+=`<line x1="${pl}" y1="${yPos}" x2="${cw-pr}" y2="${yPos}" stroke="var(--chart-grid)" stroke-width=".5" stroke-dasharray="4,3"/>`;
  }
  const xLabelCount=6;let xAxis='';
  for(let i=0;i<xLabelCount;i++){
   const idx=Math.round(i/(xLabelCount-1)*(vals.length-1));const xPos=pl+(idx/(vals.length-1))*pw;
   xAxis+=`<text x="${xPos}" y="${ch-pb+18}" text-anchor="middle" fill="var(--text-tertiary)" font-size="11">${slice[idx].date.slice(5)}</text>`;
  }
  const pts=vals.map((v,i)=>({x:pl+(i/(vals.length-1))*pw,y:pt+ph-(v-min)/range*ph})).map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const fillPts=`${pl},${pt+ph} ${pts} ${cw-pr},${pt+ph}`;
  const color=getComputedStyle(document.documentElement).getPropertyValue('--chart-line').trim()||'#58a6ff';
  const fill=getComputedStyle(document.documentElement).getPropertyValue('--chart-fill').trim()||'rgba(88,166,255,.12)';
  const lastVal=vals[vals.length-1];const lastLX=pl+(vals.length-1)/(vals.length-1)*pw;const lastLY=pt+ph-(lastVal-min)/range*ph;
  const growthColor=totalGrowth>=0?'var(--accent-green)':'var(--rank-down)';
  return `
   <div class="chart-stats">
    <div class="chart-stat">起始 <span class="num">${fmtFull(startStar)}</span></div>
    <div class="chart-stat">最新 <span class="num" style="color:var(--accent-orange)">${fmtFull(endStar)}</span></div>
    <div class="chart-stat">区间增长 <span class="num" style="color:${growthColor}">${totalGrowth>=0?'+':''}${fmtFull(totalGrowth)}</span></div>
    <div class="chart-stat">增长率 <span class="num" style="color:${growthColor}">${totalGrowth>=0?'+':''}${growthPct}%</span></div>
    <div class="chart-stat">日均 <span class="num" style="color:var(--accent-green)">+${fmtFull(avgGrowth)}</span></div>
   </div>
   <div class="chart-container" id="chartContainer">
    <div class="chart-tooltip" id="chartTooltip"></div>
    <svg viewBox="0 0 ${cw} ${ch}" style="background:transparent" id="chartSvg">
     ${gridLines}${yAxis}
     <polygon points="${fillPts}" fill="${fill}"/>
     <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="chartLine"/>
     <circle cx="${lastLX}" cy="${lastLY}" r="4" fill="${color}" stroke="var(--bg-card)" stroke-width="2"/>
     ${xAxis}
    </svg>
   </div>`;
 }

 content.innerHTML=`
  <div class="modal-title"><i class="fab fa-github"></i> ${p.owner}/${p.name} · 趋势图</div>
  <div class="chart-tabs" id="chartTabs"><button data-days="7">7 天</button><button data-days="30" class="active">30 天</button><button data-days="90">90 天</button><button data-days="365">1 年</button></div>
  <div id="chartArea">${renderChart(30)}</div>
  <div style="margin-top:14px;font-size:12px;color:var(--text-tertiary)">模拟数据 · 展示近 <span id="chartDaysLabel">30</span> 天增长趋势 · 悬停折线查看每日详情</div>`;

 modal.classList.add('show');

 setTimeout(()=>{
  // Tab switch
  document.getElementById('chartTabs').addEventListener('click',function(e){
   const btn=e.target.closest('button');if(!btn||!btn.dataset.days)return;
   document.querySelectorAll('#chartTabs button').forEach(b=>b.classList.remove('active'));
   btn.classList.add('active');currentDays=+btn.dataset.days;
   document.getElementById('chartArea').innerHTML=renderChart(currentDays);
   document.getElementById('chartDaysLabel').textContent=currentDays;
   initChartTooltip();
  },{passive:true});
  initChartTooltip();
 },50);
}

function initChartTooltip(){
 const container=document.getElementById('chartContainer');
 const svg=document.getElementById('chartSvg');
 const tooltip=document.getElementById('chartTooltip');
 if(!container||!svg||!tooltip)return;
 const chartLine=document.getElementById('chartLine');
 if(!chartLine)return;
 // Use mousemove on container
 const rect=container.getBoundingClientRect();
 container.addEventListener('mousemove',function(e){
  const r=this.getBoundingClientRect();
  const x=e.clientX-r.left;
  // Calculate data index from x position
  const cw=660,pl=50,pr=20;const pw=cw-pl-pr;
  const relX=x-pl;if(relX<0||relX>pw){tooltip.classList.remove('show');return}
  const ratio=relX/pw;
  const chartEl=document.getElementById('chartArea');
  const svgEl=chartEl?.querySelector('svg');
  if(!svgEl)return;
  // We need to know how many data points based on the current view
  const activeBtn=document.querySelector('#chartTabs .active');
  const days=activeBtn?parseInt(activeBtn.dataset.days):30;
  const pid=document.querySelector('#modalContent [data-pid]');
  // Actually, let's find the modal title
  const modalContent=document.getElementById('modalContent');
  // Better approach: get the visible data range
  const allDataEl=document.getElementById('chartArea');
  const statsEls=allDataEl?.querySelectorAll('.chart-stat');
  if(!statsEls||statsEls.length<2)return;
  // Use the stats to extract the project info... this is getting complicated.
  // Let's use a simpler approach: rebuild the data
  // Actually the simplest is to re-read the modal title
  const titleEl=modalContent?.querySelector('.modal-title');
  if(!titleEl)return;
  const repoMatch=titleEl.textContent?.match(/github\.com\/(.+)/);
  // Too complex. Let me just extract from the SVG itself
  // Actually the simplest approach - just calculate based on chart dimensions
  const pointIdx=Math.round(ratio*((days<365?days:365)-1));
  // Get the trend data from the global cache
  // We need the project id - find it from the modal title
  const modalTitle=document.querySelector('#modalContent .modal-title')?.textContent||'';
  let pid2=0;
  PROJECTS.forEach(p=>{if(modalTitle.includes(p.owner+'/'+p.name))pid2=p.id});
  if(!pid2){tooltip.classList.remove('show');return}
  const trend=getTrendData(pid2);
  if(trend.length===0)return;
  const slice=trend.slice(-(days<365?days:365));
  if(pointIdx>=slice.length){tooltip.classList.remove('show');return}
  const dp=slice[pointIdx];
  const prevDp=pointIdx>0?slice[pointIdx-1]:null;
  const dGrowth=prevDp?dp.stars-prevDp.stars:0;
  tooltip.innerHTML=`<div class="tt-date">${dp.date}</div><div class="tt-stars">⭐ ${fmtFull(dp.stars)}</div>${prevDp?`<div class="tt-growth">📈 ${dGrowth>=0?'+':''}${fmtFull(dGrowth)}</div>`:''}`;
  // Position tooltip
  const tx=Math.min(Math.max(x,10),r.width-10);
  const ty=e.clientY-r.top-50;
  tooltip.style.left=tx+'px';tooltip.style.top=Math.max(ty,10)+'px';
  tooltip.classList.add('show');
 },{passive:true});
 container.addEventListener('mouseleave',function(){tooltip.classList.remove('show')},{passive:true});
}

 const langs=[...new Set(PROJECTS.map(p=>p.language))].sort();
 const stars=[{v:'<1k',l:'< 1k'},{v:'1k-10k',l:'1k~10k'},{v:'10k-50k',l:'10k~50k'},{v:'50k-100k',l:'50k~100k'},{v:'100k+',l:'100k+'}];
 const growths=[{v:'>100',l:'> 100'},{v:'>500',l:'> 500'},{v:'>1k',l:'> 1k'},{v:'>5k',l:'> 5k'}];
 const licenses=[...new Set(PROJECTS.map(p=>p.license))].sort();

 function bindGroup(id,stateKey,items,isMulti){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=items.map(({v,l})=>{
   const active=isMulti?state[stateKey].includes(v):state[stateKey]===v;
   return`<button class="chip${active?' active':''}" data-value="${v}">${l}</button>`;
  }).join('');
  el.addEventListener('click',function(e){
   const btn=e.target.closest('.chip');if(!btn)return;
   const v=btn.dataset.value;
   if(isMulti){
    const idx=state[stateKey].indexOf(v);
    if(idx>-1)state[stateKey].splice(idx,1);else state[stateKey].push(v);
   }else{
    state[stateKey]=state[stateKey]===v?'':v;
    this.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.value===state[stateKey]));
   }
   btn.classList.toggle('active');
   updateFilterTags();state.page=1;renderAll();
  });
 }
 bindGroup('drLang','langFilter',langs.map(l=>({v:l,l})),true);
 bindGroup('drStar','starFilter',stars,false);
 bindGroup('drGrowth','growthFilter',growths,false);
 bindGroup('drLicense','licenseFilter',licenses.map(l=>({v:l,l})),true);
 updateFilterTags();
}

function updateFilterTags(){
 const tg=document.getElementById('drTags');
 const tags=[];
 state.langFilter.forEach(v=>tags.push({k:'lang',v,label:v}));
 if(state.starFilter)tags.push({k:'star',v:state.starFilter,label:'⭐ '+state.starFilter});
 if(state.growthFilter)tags.push({k:'growth',v:state.growthFilter,label:'📈 '+state.growthFilter});
 state.licenseFilter.forEach(v=>tags.push({k:'license',v,label:v}));
 // Count
 document.getElementById('filterCount').textContent=tags.length;
 document.getElementById('filterToggle').classList.toggle('active',tags.length>0);

 if(tags.length===0){tg.innerHTML='<span style="font-size:12px;color:var(--text-tertiary)">暂无筛选条件</span>';return}

 tg.innerHTML=tags.map(t=>`<span class="dr-tag" data-key="${t.k}" data-value="${t.v}">${t.label} <i class="fas fa-times"></i></span>`).join('')+
  `<button class="dr-reset" id="drResetAll"><i class="fas fa-undo"></i> 重置</button>`;

 tg.querySelectorAll('.dr-tag').forEach(el=>{el.addEventListener('click',function(){
  const k=this.dataset.key,val=this.dataset.value;
  if(k==='lang'){const idx=state.langFilter.indexOf(val);if(idx>-1)state.langFilter.splice(idx,1)}
  else if(k==='star')state.starFilter='';
  else if(k==='growth')state.growthFilter='';
  else if(k==='license'){const idx=state.licenseFilter.indexOf(val);if(idx>-1)state.licenseFilter.splice(idx,1)}
  // Refresh drawer chips
  refreshDrawerChips();
  updateFilterTags();state.page=1;renderAll();
 })});

 document.getElementById('drResetAll')?.addEventListener('click',()=>{
  resetFilters();
  refreshDrawerChips();
 });
}

function resetFilters(){
 state.langFilter=[];state.starFilter='';state.growthFilter='';state.licenseFilter=[];
 updateFilterTags();state.page=1;renderAll();
}
window.resetFilters=resetFilters; // for empty state button

function refreshDrawerChips(){
 // Re-simulate clicks on all drawer chips to update visual states
 ['drLang','drStar','drGrowth','drLicense'].forEach(id=>{
  const el=document.getElementById(id);if(!el)return;
  el.querySelectorAll('.chip').forEach(chip=>{
   const v=chip.dataset.value;
   if(id==='drLang')chip.classList.toggle('active',state.langFilter.includes(v));
   else if(id==='drStar')chip.classList.toggle('active',state.starFilter===v);
   else if(id==='drGrowth')chip.classList.toggle('active',state.growthFilter===v);
   else if(id==='drLicense')chip.classList.toggle('active',state.licenseFilter.includes(v));
  });
 });
}

// ===== 17. 历史日期 =====
function initHistory(){
 const picker=document.getElementById('histDatePicker');
 const backBtn=document.getElementById('backToday');
 const label=document.getElementById('histLabel');
 const dateText=document.getElementById('histDateText');
 // Set min/max for date picker
 const today=new Date();
 const sixMonthsAgo=new Date(today);sixMonthsAgo.setDate(today.getDate()-180);
 picker.min=sixMonthsAgo.toISOString().slice(0,10);
 picker.max=today.toISOString().slice(0,10);

 picker.addEventListener('change',function(){
  if(!this.value){goToToday();return}
  const d=new Date(this.value+'T00:00:00');d.setDate(d.getDate()+1);
  state.historyDate=d;state.historyOffset=0;
  state.page=1;
  updateHistUI();renderAll();
 });

 // Quick buttons
 document.querySelectorAll('[data-hist]').forEach(btn=>{
  btn.addEventListener('click',function(){
   document.querySelectorAll('[data-hist]').forEach(b=>b.classList.remove('active'));
   this.classList.add('active');
   state.historyOffset=parseInt(this.dataset.hist);state.historyDate=null;
   state.page=1;
   picker.value='';
   updateHistUI();renderAll();
  });
 });

 backBtn.addEventListener('click',goToToday);
}

function goToToday(){
 state.historyOffset=0;state.historyDate=null;state.page=1;
 document.querySelectorAll('[data-hist]').forEach(b=>b.classList.remove('active'));
 const todayBtn=document.querySelector('[data-hist="0"]');
 if(todayBtn)todayBtn.classList.add('active');
 document.getElementById('histDatePicker').value='';
 updateHistUI();renderAll();
}

function updateHistUI(){
 const label=document.getElementById('histLabel');
 const dateText=document.getElementById('histDateText');
 const backBtn=document.getElementById('backToday');
 const isHistory=state.historyOffset!==0||state.historyDate;
 if(!isHistory){
  label.classList.remove('show');backBtn.classList.remove('show');
  return;
 }
 label.classList.add('show');
 let text='';
 if(state.historyDate)text=state.historyDate.toISOString().slice(0,10);
 else{
  const d=new Date();d.setDate(d.getDate()+state.historyOffset);
  text=d.toISOString().slice(0,10);
 }
 dateText.textContent=text;
 backBtn.classList.add('show');
 // Update URL
 const url=new URL(window.location);url.searchParams.set('date',text);
 window.history.replaceState({},'',url);
}

// ===== 18. Tab 切换 =====
function initTabs(){
 document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
   document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
   this.classList.add('active');
   document.querySelectorAll('.rank-list').forEach(p=>p.classList.remove('active'));
   state.currentTab=this.dataset.tab;state.page=1;
   document.getElementById(state.currentTab).classList.add('active');
   renderAll();
  });
 });
}

// ===== 19. 收藏 =====
function toggleFav(id){
 if(typeof id==='string'){showToast('⭐ 收藏仅支持榜单项目');return}
 const idx=state.favorites.indexOf(id);
 if(idx>-1)state.favorites.splice(idx,1);else state.favorites.push(id);
 localStorage.setItem('aiRankFav',JSON.stringify(state.favorites));
 updateFavUI();renderAll();renderFavSidebar();
}
function updateFavUI(){document.getElementById('favCount').textContent=state.favorites.length}
function renderFavSidebar(){
 const el=document.getElementById('favList');
 if(state.favorites.length===0){el.innerHTML='<div class="empty-fav"><i class="far fa-star" style="font-size:32px;display:block;margin-bottom:12px;opacity:.3"></i>还没有收藏的项目</div>';return}
 el.innerHTML=state.favorites.map(id=>{const p=PROJECTS.find(x=>x.id===id);if(!p)return '';return `<div class="fav-item"><i class="fas fa-star" style="color:var(--accent-orange);font-size:12px"></i><a href="${p.url}" target="_blank">${p.owner}/${p.name}</a><span class="remove-fav" data-id="${p.id}"><i class="fas fa-times"></i></span></div>`}).join('');
 el.querySelectorAll('.remove-fav').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();toggleFav(+btn.dataset.id)})});
}
function initFav(){
 function closeFavSidebar(){document.getElementById('favSidebar').classList.remove('open');document.getElementById('favOverlay').classList.remove('show')}
 document.getElementById('favBtn').addEventListener('click',()=>{document.getElementById('favSidebar').classList.add('open');document.getElementById('favOverlay').classList.add('show')});
 document.getElementById('closeFav').addEventListener('click',closeFavSidebar);
 // Click outside fav sidebar closes it
 document.addEventListener('click',function(e){const fs=document.getElementById('favSidebar');if(!fs.classList.contains('open'))return;if(!fs.contains(e.target)&&e.target.id!=='favBtn'&&!document.getElementById('favBtn').contains(e.target)){closeFavSidebar()}});
}

// ===== 20. 对比栏 =====
function updateCompareBar(){
 const bar=document.getElementById('compareBar');
 const count=document.getElementById('compareCount');
 const btn=document.getElementById('btnCompare');
 count.textContent=state.compareIds.length;
 if(state.compareIds.length>=1)bar.classList.add('show');else bar.classList.remove('show');
 btn.disabled=state.compareIds.length<2;
}
function initCompare(){
 document.getElementById('btnCompare').addEventListener('click',openCompareModal);
 document.getElementById('btnClearCompare').addEventListener('click',()=>{state.compareIds=[];updateCompareBar();renderAll()});
}

// ===== 21. Back to Top =====
function initBackTop(){
 const btn=document.getElementById('backTop');let t=false;
 window.addEventListener('scroll',()=>{if(!t){requestAnimationFrame(()=>{btn.classList.toggle('show',window.scrollY>300);t=false});t=true}});
 btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
}

// ===== 22. Modal =====
function initModal(){
 document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('show'));
 document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});
}

// ===== 23. URL 参数恢复 =====
function restoreFromURL(){
 const params=new URLSearchParams(window.location.search);
 const date=params.get('date');
 if(date){
  const d=new Date(date+'T00:00:00');d.setDate(d.getDate()+1);
  if(!isNaN(d.getTime())){
   state.historyDate=d;state.historyOffset=0;
   document.querySelectorAll('[data-hist]').forEach(b=>b.classList.remove('active'));
   document.getElementById('histDatePicker').value=date;
  }
 }
}

// ===== 24. 初始化 =====
buildRankData();
initTheme();
initTabs();
initToolbar();
buildFilterDrawer();
initHistory();
initFav();
initCompare();
initBackTop();
initModal();
restoreFromURL();
renderAll();
renderFavSidebar();
updateFavUI();

document.getElementById('updateTime').textContent=
 `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
console.log('✅ AI 开源项目排行榜 v5 已加载');
