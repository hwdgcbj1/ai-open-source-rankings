<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>GitHub 最佳 AI 开源项目排行榜</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
 <style>
 /* ===== CSS 变量：明 / 暗模式 ===== */
 :root {
 --bg: #0d1117;
 --bg-card: #161b22;
 --bg-card-hover: #161b22;
 --bg-toolbar: #161b22;
 --border: #21262d;
 --border-hover: #30363d;
 --text-primary: #f0f6fc;
 --text-secondary: #b1bac4;
 --text-tertiary: #8b949e;
 --text-muted: #484f58;
 --accent-green: #3fb950;
 --accent-green-dim: #2d6e38;
 --accent-orange: #f0883e;
 --accent-purple: #bc8cff;
 --accent-blue: #58a6ff;
 --accent-blue-hover: #79c0ff;
 --tab-bg: #161b22;
 --tab-active: #238636;
 --tab-active-shadow: rgba(35, 134, 54, 0.35);
 --rank-gold: #f0883e;
 --rank-silver: #c0c0c0;
 --rank-bronze: #cd7f32;
 --shadow: rgba(0, 0, 0, 0.4);
 --progress-bg: #21262d;
 --search-bg: #0d1117;
 --badge-bg: #21262d;
 --badge-border: #30363d;
 --toggle-bg: #30363d;
 --scrollbar-track: #0d1117;
 --scrollbar-thumb: #30363d;
 --scrollbar-thumb-hover: #484f58;
 --tooltip-bg: #1c2333;
 --tooltip-border: #30363d;
 --accent-line: #238636;
 }

 [data-theme="light"] {
 --bg: #f6f8fa;
 --bg-card: #ffffff;
 --bg-card-hover: #ffffff;
 --bg-toolbar: #ffffff;
 --border: #d0d7de;
 --border-hover: #afb8c1;
 --text-primary: #1f2328;
 --text-secondary: #656d76;
 --text-tertiary: #8c959f;
 --text-muted: #afb8c1;
 --accent-green: #1a7f37;
 --accent-green-dim: #9bc3a0;
 --accent-orange: #bd561d;
 --accent-purple: #8250df;
 --accent-blue: #0969da;
 --accent-blue-hover: #0550ae;
 --tab-bg: #f6f8fa;
 --tab-active: #2da44e;
 --tab-active-shadow: rgba(45, 164, 78, 0.25);
 --rank-gold: #bd561d;
 --rank-silver: #656d76;
 --rank-bronze: #9a6700;
 --shadow: rgba(31, 35, 40, 0.12);
 --progress-bg: #d0d7de;
 --search-bg: #ffffff;
 --badge-bg: #f6f8fa;
 --badge-border: #d0d7de;
 --toggle-bg: #d0d7de;
 --scrollbar-track: #f6f8fa;
 --scrollbar-thumb: #d0d7de;
 --scrollbar-thumb-hover: #afb8c1;
 --tooltip-bg: #ffffff;
 --tooltip-border: #d0d7de;
 --accent-line: #2da44e;
 }

 *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 html { scroll-behavior: smooth; }
 body {
 font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
 background: var(--bg); color: var(--text-primary);
 min-height: 100vh; padding: 0;
 display: flex; justify-content: center;
 transition: background .3s, color .3s;
 }
 .container { max-width: 1100px; width: 100%; padding: 24px 16px 60px; }

 /* ===== 头部 ===== */
 .header {
 display: flex; align-items: center; justify-content: space-between;
 flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
 padding-bottom: 16px; border-bottom: 1px solid var(--border);
 }
 .header-left { display: flex; align-items: center; gap: 12px; }
 .header-left .logo {
 font-size: 26px; color: #fff;
 background: var(--tab-active); width: 42px; height: 42px;
 border-radius: 50%; display: flex; align-items: center; justify-content: center;
 transition: background .3s;
 }
 .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
 .header-left h1 .gradient {
 background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-tertiary) 100%);
 -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
 }
 .header-left h1 span { font-weight: 300; color: var(--text-tertiary); }
 .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }

 /* 明 / 暗切换 */
 .theme-toggle {
 position: relative; width: 48px; height: 26px;
 background: var(--toggle-bg); border-radius: 13px; cursor: pointer;
 border: 1px solid var(--border); transition: background .3s; flex-shrink: 0;
 }
 .theme-toggle .knob {
 position: absolute; top: 2px; left: 2px; width: 20px; height: 20px;
 background: #f0f6fc; border-radius: 50%; transition: all .3s;
 display: flex; align-items: center; justify-content: center; font-size: 11px;
 }
 [data-theme="light"] .theme-toggle .knob { left: 24px; background: #1f2328; }
 .theme-toggle .knob i { transition: opacity .3s; }
 [data-theme="light"] .theme-toggle .knob .fa-moon { display: none; }
 [data-theme="dark"] .theme-toggle .knob .fa-sun { display: none; }

 /* ===== 数据新鲜度栏（含更新时间） ===== */
 .data-bar {
 display: flex; align-items: center; gap: 16px;
 margin-bottom: 16px; padding: 10px 16px;
 background: var(--bg-card); border: 1px solid var(--border);
 border-radius: 10px; font-size: 12px; color: var(--text-tertiary); flex-wrap: wrap;
 }
 .data-bar .fresh { display: flex; align-items: center; gap: 6px; }
 .data-bar .fresh .green-dot {
 width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green);
 animation: pulse-dot 2s ease-in-out infinite;
 }
 @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
 .data-bar .fresh .label { color: var(--text-secondary); font-weight: 600; }
 .data-bar .update-time {
 margin-left: auto; display: flex; align-items: center; gap: 4px;
 font-size: 12px; color: var(--text-tertiary); white-space: nowrap;
 }
 .data-bar .update-time i { font-size: 11px; }
 .data-bar .update-time strong { color: var(--text-secondary); font-weight: 500; }

 /* ===== 工具栏 ===== */
 .toolbar {
 display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
 }
 .toolbar .search-wrap {
 flex: 1; min-width: 180px; position: relative;
 }
 .toolbar .search-wrap input {
 width: 100%; padding: 9px 14px 9px 36px;
 background: var(--search-bg); border: 1px solid var(--border);
 border-radius: 10px; color: var(--text-primary); font-size: 14px;
 font-family: inherit; outline: none; transition: border-color .2s;
 }
 .toolbar .search-wrap input:focus { border-color: var(--accent-blue); }
 .toolbar .search-wrap i.search-icon {
 position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
 color: var(--text-tertiary); font-size: 14px; pointer-events: none;
 }
 .toolbar .search-wrap .clear-btn {
 position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
 background: none; border: none; color: var(--text-tertiary); cursor: pointer;
 font-size: 14px; display: none; padding: 4px;
 }
 .toolbar .search-wrap .clear-btn.show { display: block; }
 .toolbar .search-wrap .clear-btn:hover { color: var(--text-primary); }

 .toolbar select {
 padding: 9px 14px; background: var(--search-bg); border: 1px solid var(--border);
 border-radius: 10px; color: var(--text-secondary); font-size: 13px;
 font-family: inherit; outline: none; cursor: pointer; min-width: 80px;
 transition: all .2s; appearance: auto;
 }
 .toolbar select:focus { border-color: var(--accent-blue); }
 .toolbar select.changed { color: var(--text-primary); border-color: var(--accent-blue); }

 .toolbar .minimal-toggle {
 display: flex; align-items: center; gap: 6px;
 padding: 8px 14px; background: var(--search-bg); border: 1px solid var(--border);
 border-radius: 10px; color: var(--text-tertiary); font-size: 13px;
 cursor: pointer; transition: all .2s; font-family: inherit; white-space: nowrap;
 }
 .toolbar .minimal-toggle:hover { border-color: var(--border-hover); color: var(--text-secondary); }
 .toolbar .minimal-toggle.active {
 background: var(--tab-active); color: #fff; border-color: var(--tab-active);
 }

 /* ===== 标签页（无badge） ===== */
 .tabs {
 display: flex; gap: 4px; margin-bottom: 20px;
 background: var(--tab-bg); padding: 5px; border-radius: 12px;
 border: 1px solid var(--border); flex-wrap: wrap;
 }
 .tab-btn {
 flex: 1; min-width: 90px; padding: 10px 16px; border: none; border-radius: 9px;
 background: transparent; color: var(--text-tertiary); font-size: 14px;
 font-weight: 600; cursor: pointer; transition: all .25s ease;
 display: flex; align-items: center; justify-content: center; gap: 6px;
 font-family: inherit; position: relative;
 }
 .tab-btn:hover { color: var(--text-primary); background: rgba(255,255,255,.04); }
 .tab-btn.active {
 background: var(--tab-active); color: #fff;
 box-shadow: 0 3px 10px var(--tab-active-shadow);
 }

 /* ===== 排行榜列表 ===== */
 .rank-list { display: none; animation: fadeUp .35s ease; }
 .rank-list.active { display: block; }
 @keyframes fadeUp {
 0% { opacity: 0; transform: translateY(14px); }
 100% { opacity: 1; transform: translateY(0); }
 }

 /* ===== 排名徽章 ===== */
 .rank-badge {
 width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
 display: flex; align-items: center; justify-content: center;
 font-size: 18px; font-weight: 800; letter-spacing: -.5px;
 font-feature-settings: "tnum"; position: relative;
 }
 .rank-badge.top1 { background: linear-gradient(135deg, #f5a623, #f0883e); color: #fff; }
 .rank-badge.top2 { background: linear-gradient(135deg, #d0d5dc, #b0b8c4); color: #2d3139; }
 .rank-badge.top3 { background: linear-gradient(135deg, #d4a86a, #cd7f32); color: #fff; }
 .rank-badge.other {
 background: var(--tab-bg); color: var(--text-tertiary);
 border: 1px solid var(--border); border-radius: 50%; font-size: 16px;
 }

 /* 冠/亚/季军标记 */
 .rank-badge .trophy { position: absolute; top: -7px; right: -6px; font-size: 13px; }

 /* 进度条基准说明 */
 .progress-note {
 font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; padding-left: 2px;
 }

 /* ===== 项目卡片 ===== */
 .rank-item {
 display: flex; gap: 16px; background: var(--bg-card);
 border: 1px solid var(--border); border-radius: 14px;
 padding: 18px 20px; margin-bottom: 10px;
 transition: all .2s ease; cursor: default; position: relative;
 box-shadow: 0 1px 4px rgba(0,0,0,.15);
 }
 .rank-item:hover {
 border-color: var(--border-hover);
 box-shadow: 0 6px 24px var(--shadow);
 /* 左侧强调竖线 */
 background: linear-gradient(90deg, var(--accent-line) 0px, var(--accent-line) 3px, var(--bg-card) 3px);
 }
 [data-theme="light"] .rank-item:hover {
 background: linear-gradient(90deg, var(--accent-line) 0px, var(--accent-line) 3px, var(--bg-card) 3px);
 }

 .rank-content { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 6px; }

 /* 第 1 级：仓库名（无小星标） */
 .project-name {
 font-size: 17px; font-weight: 600; color: var(--text-primary);
 display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
 }
 .project-name a {
 color: var(--accent-blue); text-decoration: none; transition: color .2s;
 }
 .project-name a:hover { color: var(--accent-blue-hover); text-decoration: underline; }
 .project-name .repo-icon { color: var(--text-tertiary); font-size: 15px; }
 .project-name .ext-link {
 font-size: 12px; color: var(--text-tertiary); opacity: .4;
 transition: opacity .2s; text-decoration: none;
 }
 .project-name:hover .ext-link { opacity: .85; }

 /* 第 2 级：总星标（大号主题色，无重复小标签） */
 .stars-main {
 font-size: 28px; font-weight: 700; color: var(--accent-orange);
 line-height: 1.1; letter-spacing: -.5px;
 }
 .stars-main .label { font-size: 13px; font-weight: 400; color: var(--text-tertiary); margin-left: 6px; }

 /* 第 3 级：增长数据 - 分三级视觉权重 */
 .growth-row {
 display: flex; flex-wrap: wrap; align-items: center; gap: 6px 22px;
 }
 .growth-item {
 display: flex; align-items: center; gap: 4px;
 font-size: 13px; color: var(--text-tertiary);
 }
 /* 核心指标（今日/本月/年度）：亮绿加粗 */
 .growth-item.primary .val { font-weight: 700; color: var(--accent-green); font-size: 14px; }
 .growth-item.primary i { color: var(--accent-green); }
 /* 次要（上周/上月/上月）：标准绿 */
 .growth-item.secondary .val { font-weight: 500; color: var(--accent-green); opacity: .75; }
 .growth-item.secondary i { color: var(--accent-green); opacity: .65; }
 /* 弱化（上月/年度/上月以外的远端）：浅灰绿 */
 .growth-item.tertiary .val { font-weight: 400; color: var(--text-tertiary); }
 .growth-item.tertiary i { color: var(--text-tertiary); }

 /* 迷你进度条 - 仅给核心指标 */
 .mini-bar-wrap {
 flex: 1; min-width: 80px; max-width: 160px; display: flex; align-items: center; gap: 6px;
 }
 .mini-bar {
 flex: 1; height: 5px; background: var(--progress-bg); border-radius: 3px; overflow: hidden;
 }
 .mini-bar .fill {
 height: 100%; border-radius: 3px; transition: width .6s ease;
 }
 .mini-bar .fill.lv-1 { background: var(--accent-green); opacity: .35; }
 .mini-bar .fill.lv-2 { background: var(--accent-green); opacity: .55; }
 .mini-bar .fill.lv-3 { background: var(--accent-green); opacity: .75; }
 .mini-bar .fill.lv-4 { background: var(--accent-orange); }
 .mini-bar .fill.lv-5 { background: #e05a30; }
 .mini-bar .pct-label {
 font-size: 11px; color: var(--text-tertiary); white-space: nowrap; min-width: 34px;
 }

 /* 第 4 级：项目描述 */
 .project-desc {
 font-size: 13px; color: var(--text-tertiary); line-height: 1.55;
 overflow: hidden; transition: all .3s ease;
 }
 .project-desc.clamped {
 display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
 }
 .project-desc .more-btn {
 display: inline; color: var(--accent-blue); cursor: pointer;
 font-size: 12px; font-weight: 500; margin-left: 6px;
 border-bottom: 1px dashed var(--accent-blue); text-decoration: none;
 }
 .project-desc .more-btn:hover { color: var(--accent-blue-hover); }

 /* ===== 极简模式 ===== */
 .minimal-mode .stars-main { font-size: 20px; }
 .minimal-mode .growth-row { display: none; }
 .minimal-mode .project-desc { display: none; }
 .minimal-mode .project-desc.clamped { display: none; }
 .minimal-mode .mini-bar-wrap { display: none; }
 .minimal-mode .rank-item { padding: 12px 16px; }
 .minimal-mode .rank-content { gap: 3px; }
 .minimal-mode .progress-note { display: none; }

 /* ===== 悬浮快捷操作 ===== */
 .quick-actions {
 position: absolute; top: 12px; right: 12px;
 display: flex; gap: 4px; opacity: 0; transition: opacity .2s;
 }
 .rank-item:hover .quick-actions { opacity: 1; }
 @media (max-width: 768px) { .quick-actions { opacity: 1; } }

 .quick-actions button {
 width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
 background: var(--bg-card); color: var(--text-tertiary); cursor: pointer;
 display: flex; align-items: center; justify-content: center;
 font-size: 13px; transition: all .15s;
 }
 .quick-actions button:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--border-hover); }
 .quick-actions button.faved { color: var(--accent-orange); }

 /* Toast 提示 */
 .toast {
 position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
 background: var(--bg-card); border: 1px solid var(--border);
 border-radius: 10px; padding: 10px 22px; font-size: 14px; color: var(--text-primary);
 box-shadow: 0 6px 24px var(--shadow); z-index: 999;
 opacity: 0; pointer-events: none; transition: all .3s;
 display: flex; align-items: center; gap: 8px;
 }
 .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
 .toast i { color: var(--accent-green); }

 /* Tooltip */
 [data-tooltip] { position: relative; cursor: help; }
 [data-tooltip]::after {
 content: attr(data-tooltip); position: absolute; bottom: calc(100% + 6px);
 left: 50%; transform: translateX(-50%); white-space: nowrap;
 background: var(--tooltip-bg); color: var(--text-primary);
 border: 1px solid var(--tooltip-border); border-radius: 6px;
 padding: 4px 10px; font-size: 12px; font-weight: 500;
 opacity: 0; pointer-events: none; transition: opacity .15s; z-index: 10;
 box-shadow: 0 4px 12px var(--shadow);
 }
 [data-tooltip]:hover::after { opacity: 1; }

 /* ===== 分页 ===== */
 .pagination {
 display: flex; align-items: center; justify-content: center;
 gap: 6px; margin-top: 20px;
 }
 .pagination button {
 padding: 8px 14px; border: 1px solid var(--border); border-radius: 8px;
 background: var(--bg-card); color: var(--text-secondary); cursor: pointer;
 font-size: 13px; font-family: inherit; transition: all .15s;
 }
 .pagination button:hover:not(:disabled) {
 background: var(--bg-card-hover); border-color: var(--border-hover); color: var(--text-primary);
 }
 .pagination button.active {
 background: var(--tab-active); color: #fff; border-color: var(--tab-active);
 }
 .pagination button:disabled { opacity: .35; cursor: not-allowed; }
 .pagination .page-info { font-size: 13px; color: var(--text-tertiary); margin: 0 4px; }

 /* ===== 回到顶部 ===== */
 .back-top {
 position: fixed; bottom: 32px; right: 24px; z-index: 100;
 width: 44px; height: 44px; border-radius: 50%;
 background: var(--tab-active); color: #fff; border: none; cursor: pointer;
 font-size: 18px; display: flex; align-items: center; justify-content: center;
 box-shadow: 0 4px 16px var(--tab-active-shadow); opacity: 0;
 transform: translateY(20px); transition: all .3s; pointer-events: none;
 }
 .back-top.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
 .back-top:hover { transform: translateY(-3px); box-shadow: 0 6px 24px var(--tab-active-shadow); }

 /* ===== 收藏 ===== */
 .fav-sidebar {
 position: fixed; top: 0; right: -320px; width: 300px; height: 100vh;
 background: var(--bg-card); border-left: 1px solid var(--border);
 z-index: 200; transition: right .35s ease; overflow-y: auto;
 padding: 20px 16px;
 }
 .fav-sidebar.open { right: 0; }
 .fav-sidebar .fav-title {
 display: flex; align-items: center; justify-content: space-between;
 margin-bottom: 16px; font-size: 16px; font-weight: 600;
 }
 .fav-sidebar .fav-title button {
 background: none; border: none; color: var(--text-tertiary);
 cursor: pointer; font-size: 18px; padding: 4px;
 }
 .fav-sidebar .fav-item {
 display: flex; align-items: center; gap: 8px;
 padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border);
 margin-bottom: 6px; font-size: 13px; cursor: default; transition: background .15s;
 }
 .fav-sidebar .fav-item:hover { background: var(--bg-card-hover); }
 .fav-sidebar .fav-item a { color: var(--accent-blue); text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
 .fav-sidebar .fav-item .remove-fav { color: var(--text-tertiary); cursor: pointer; font-size: 12px; padding: 2px 4px; }
 .fav-sidebar .fav-item .remove-fav:hover { color: #f85149; }
 .fav-sidebar .empty-fav {
 text-align: center; padding: 40px 0; color: var(--text-tertiary); font-size: 13px;
 }
 .fav-overlay {
 position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199;
 opacity: 0; pointer-events: none; transition: opacity .35s;
 }
 .fav-overlay.show { opacity: 1; pointer-events: auto; }
 .fav-btn {
 position: fixed; bottom: 84px; right: 24px; z-index: 100;
 width: 44px; height: 44px; border-radius: 50%;
 background: var(--bg-card); color: var(--accent-orange); border: 1px solid var(--border);
 cursor: pointer; font-size: 16px; display: flex; align-items: center;
 justify-content: center; box-shadow: 0 2px 8px var(--shadow);
 transition: all .2s;
 }
 .fav-btn:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }
 .fav-btn .count {
 position: absolute; top: -4px; right: -4px; font-size: 10px;
 background: var(--accent-orange); color: #fff; border-radius: 50%;
 width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
 font-weight: 700;
 }

 /* ===== 空状态 ===== */
 .empty-state {
 text-align: center; padding: 60px 20px; color: var(--text-tertiary);
 }
 .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: .4; }
 .empty-state p { font-size: 15px; }

 /* ===== 页脚 ===== */
 .footer {
 margin-top: 40px; text-align: center; font-size: 12px; color: var(--text-muted);
 border-top: 1px solid var(--border); padding-top: 20px;
 display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
 }
 .footer a { color: var(--accent-blue); text-decoration: none; }
 .footer a:hover { text-decoration: underline; }

 /* ===== 滚动条 ===== */
 ::-webkit-scrollbar { width: 6px; height: 6px; }
 ::-webkit-scrollbar-track { background: var(--scrollbar-track); }
 ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 8px; }
 ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

 /* ===== 响应式 ===== */
 @media (max-width: 768px) {
 .header { flex-direction: column; align-items: flex-start; }
 .header-left h1 { font-size: 19px; }
 .header-right { width: 100%; justify-content: flex-end; }
 .toolbar select { min-width: 60px; font-size: 12px; padding: 8px 10px; }
 .toolbar .minimal-toggle { font-size: 12px; padding: 7px 10px; }
 .rank-item { padding: 14px 16px; gap: 12px; flex-direction: column; }
 .rank-badge { width: 34px; height: 34px; font-size: 16px; align-self: flex-start; }
 .rank-badge.other { font-size: 14px; }
 .stars-main { font-size: 22px; }
 .project-name { font-size: 15px; }
 .tab-btn { min-width: 60px; padding: 8px 12px; font-size: 13px; }
 .mini-bar-wrap { max-width: 120px; }
 .quick-actions button { width: 28px; height: 28px; font-size: 12px; }
 .back-top { bottom: 20px; right: 16px; width: 40px; height: 40px; font-size: 16px; }
 .fav-btn { bottom: 70px; right: 16px; width: 40px; height: 40px; font-size: 14px; }
 .fav-sidebar { width: 260px; }
 .data-bar { font-size: 11px; padding: 8px 12px; }
 .data-bar .update-time { margin-left: 0; width: 100%; justify-content: flex-end; }
 .growth-item { font-size: 12px; }
 .growth-item.primary .val { font-size: 13px; }
 .rank-item:hover { background: var(--bg-card); }
 }

 @media (max-width: 480px) {
 .container { padding: 16px 10px 40px; }
 .header-left .logo { width: 36px; height: 36px; font-size: 22px; }
 .rank-item { padding: 12px; }
 .stars-main { font-size: 20px; }
 .project-name { font-size: 14px; }
 .mini-bar-wrap { max-width: 80px; }
 }
 </style>
</head>
<body>
 <div class="container">

 <!-- ===== 头部 ===== -->
 <header class="header">
 <div class="header-left">
 <div class="logo"><i class="fab fa-github"></i></div>
 <h1><span class="gradient">AI 开源热榜</span> <span>· 最佳项目</span></h1>
 </div>
 <div class="header-right">
 <div class="theme-toggle" id="themeToggle" role="button" tabindex="0" aria-label="切换明暗模式">
 <span class="knob"><i class="fas fa-moon"></i><i class="fas fa-sun"></i></span>
 </div>
 </div>
 </header>

 <!-- ===== 数据新鲜度栏（含更新时间） ===== -->
 <div class="data-bar">
 <span class="fresh"><span class="green-dot"></span> <span class="label">今日已更新</span></span>
 <span>基于 GitHub 公共数据 · 每日刷新 · AI 项目</span>
 <span class="update-time">
 <i class="fas fa-sync-alt fa-fw" style="font-size:11px"></i>
 更新于 <strong id="updateTime">2026-07-18 14:30</strong>
 </span>
 </div>

 <!-- ===== 工具栏 ===== -->
 <div class="toolbar" id="toolbar">
 <div class="search-wrap">
 <i class="fas fa-search search-icon"></i>
 <input type="text" id="searchInput" placeholder="搜索仓库名 / 所有者…" autocomplete="off" />
 <button class="clear-btn" id="clearSearch"><i class="fas fa-times"></i></button>
 </div>
 <select id="categoryFilter">
 <option value="">🏷️ 全部分类</option>
 <option value="训练框架">训练框架</option>
 <option value="NLP">NLP</option>
 <option value="LLM 框架">LLM 框架</option>
 <option value="推理加速">推理加速</option>
 <option value="图像生成">图像生成</option>
 <option value="语音">语音</option>
 <option value="计算机视觉">计算机视觉</option>
 <option value="机器学习">机器学习</option>
 <option value="工具">工具</option>
 </select>
 <select id="sortSelect">
 <option value="tab">📊 榜单排序</option>
 <option value="stars">⭐ 总星标</option>
 <option value="daily">📈 今日涨幅</option>
 <option value="monthly">📆 本月涨幅</option>
 <option value="yearly">📅 年度涨幅</option>
 </select>
 <button class="minimal-toggle" id="minimalToggle">
 <i class="fas fa-compress-alt"></i> <span>极简</span>
 </button>
 </div>

 <!-- ===== 标签页 ===== -->
 <div class="tabs" role="tablist">
 <button class="tab-btn active" data-tab="daily" role="tab"><i class="fas fa-sun"></i> 日榜</button>
 <button class="tab-btn" data-tab="monthly" role="tab"><i class="fas fa-calendar-alt"></i> 月榜</button>
 <button class="tab-btn" data-tab="yearly" role="tab"><i class="fas fa-calendar-check"></i> 年榜</button>
 </div>

 <!-- ===== 排行榜 ===== -->
 <div id="daily" class="rank-list active" role="tabpanel"></div>
 <div id="monthly" class="rank-list" role="tabpanel"></div>
 <div id="yearly" class="rank-list" role="tabpanel"></div>

 <!-- ===== 分页 ===== -->
 <div class="pagination" id="pagination"></div>

 <!-- ===== 页脚 ===== -->
 <div class="footer">
 <span>⭐ 数据基于 GitHub 公开 API 模拟</span>
 <a href="https://github.com/hwdgcbj1/ai-open-source-rankings" target="_blank"><i class="fab fa-github"></i> 项目源码</a>
 <span>📊 每日自动更新</span>
 </div>
 </div>

 <!-- ===== Toast ===== -->
 <div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg">已复制</span></div>

 <!-- ===== 回到顶部 ===== -->
 <button class="back-top" id="backTop" aria-label="回到顶部"><i class="fas fa-chevron-up"></i></button>

 <!-- ===== 收藏按钮 ===== -->
 <button class="fav-btn" id="favBtn" aria-label="收藏夹">
 <i class="fas fa-star"></i>
 <span class="count" id="favCount">0</span>
 </button>

 <!-- ===== 收藏侧栏覆盖层 ===== -->
 <div class="fav-overlay" id="favOverlay"></div>

 <!-- ===== 收藏侧栏 ===== -->
 <div class="fav-sidebar" id="favSidebar">
 <div class="fav-title">
 <span><i class="fas fa-star" style="color:var(--accent-orange)"></i> 我的收藏</span>
 <button id="closeFav"><i class="fas fa-times"></i></button>
 </div>
 <div id="favList"></div>
 </div>

 <script>
 // ================================================================
 // 1. 数据集
 // ================================================================
 const CATEGORIES = {
 tensorflow: '训练框架', pytorch: '训练框架', transformers: 'NLP',
 langchain: 'LLM 框架', ollama: '推理加速', 'llama.cpp': '推理加速',
 'stable-diffusion-webui': '图像生成', whisper: '语音',
 opencv: '计算机视觉', 'scikit-learn': '机器学习', keras: '训练框架',
 jax: '训练框架', fastai: '训练框架', DeepSpeed: '训练框架',
 'Megatron-LM': '训练框架', diffusers: '图像生成', mlflow: '机器学习',
 ray: '机器学习', cog: '工具', wandb: '工具'
 };

 const PROJECTS = [
 { id: 1, owner: 'tensorflow', name: 'tensorflow', description: '面向所有人的开源机器学习框架。使用 Python、C++ 和 JavaScript 构建和训练 ML 模型，支持从研究到生产全流程。', url: 'https://github.com/tensorflow/tensorflow', stars: 185000 },
 { id: 2, owner: 'pytorch', name: 'pytorch', description: 'Python 中的张量和动态神经网络，具有强大的 GPU 加速。用于深度学习和 AI 研究，以动态计算图和易用性著称。', url: 'https://github.com/pytorch/pytorch', stars: 82000 },
 { id: 3, owner: 'huggingface', name: 'transformers', description: '最先进的自然语言处理（NLP）模型库，支持 PyTorch、TensorFlow 和 JAX。提供数千个预训练模型，涵盖文本、图像、音频等多模态任务。', url: 'https://github.com/huggingface/transformers', stars: 130000 },
 { id: 4, owner: 'langchain-ai', name: 'langchain', description: '用于开发由大型语言模型（LLM）驱动的应用程序的框架。提供链式调用、Agent、RAG 等模块化组件，简化 AI 应用构建。', url: 'https://github.com/langchain-ai/langchain', stars: 90000 },
 { id: 5, owner: 'ollama', name: 'ollama', description: '在本地运行大型语言模型的轻量级工具，支持 Llama、Mistral 等主流模型。一键下载、零配置运行，保护数据隐私。', url: 'https://github.com/ollama/ollama', stars: 50000 },
 { id: 6, owner: 'ggerganov', name: 'llama.cpp', description: '使用 C++ 实现的 Llama 模型推理，支持 CPU 和 GPU 高效运行。无外部依赖，可在消费级硬件上运行大模型。', url: 'https://github.com/ggerganov/llama.cpp', stars: 60000 },
 { id: 7, owner: 'AUTOMATIC1111', name: 'stable-diffusion-webui', description: 'Stable Diffusion 的图形化 Web 界面，支持各种图像生成和编辑功能。集成 ControlNet、LoRA、超分辨率等扩展。', url: 'https://github.com/AUTOMATIC1111/stable-diffusion-webui', stars: 140000 },
 { id: 8, owner: 'openai', name: 'whisper', description: 'OpenAI 的通用语音识别模型，支持多种语言的音频转文本。在多种口音和环境噪声下表现优异，支持 99+ 种语言。', url: 'https://github.com/openai/whisper', stars: 60000 },
 { id: 9, owner: 'opencv', name: 'opencv', description: '开源计算机视觉和机器学习软件库，提供数百种算法。支持图像处理、视频分析、目标检测、人脸识别等经典 CV 任务。', url: 'https://github.com/opencv/opencv', stars: 78000 },
 { id: 10, owner: 'scikit-learn', name: 'scikit-learn', description: 'Python 的经典机器学习库，提供简单高效的数据挖掘和数据分析工具。内置分类、回归、聚类、降维等算法，API 设计优雅。', url: 'https://github.com/scikit-learn/scikit-learn', stars: 58000 },
 { id: 11, owner: 'keras-team', name: 'keras', description: '高级神经网络 API，用 Python 编写，可运行在 TensorFlow 之上。以极简 API 设计闻名，适合快速原型开发和教学。', url: 'https://github.com/keras-team/keras', stars: 61000 },
 { id: 12, owner: 'jax-ml', name: 'jax', description: '支持自动微分和 GPU/TPU 加速的 Python 数值计算库，专为机器学习研究设计。函数式编程范式，即时编译（JIT）加速。', url: 'https://github.com/jax-ml/jax', stars: 30000 },
 { id: 13, owner: 'fastai', name: 'fastai', description: '简化深度学习训练和部署的库，提供高层 API 和最佳实践。搭配课程和教材，是入门深度学习的热门选择。', url: 'https://github.com/fastai/fastai', stars: 25000 },
 { id: 14, owner: 'microsoft', name: 'DeepSpeed', description: '深度学习训练优化库，支持大规模模型训练和推理加速。ZeRO 优化器可训练千亿参数模型，大幅降低显存占用。', url: 'https://github.com/microsoft/DeepSpeed', stars: 35000 },
 { id: 15, owner: 'NVIDIA', name: 'Megatron-LM', description: '用于训练大规模语言模型的分布式训练框架。提供模型并行、数据并行、流水线并行等多维并行策略。', url: 'https://github.com/NVIDIA/Megatron-LM', stars: 16000 },
 { id: 16, owner: 'huggingface', name: 'diffusers', description: '用于图像和音频生成的最先进扩散模型库。支持文生图、图生图、图像修复、超分辨率等多种生成任务。', url: 'https://github.com/huggingface/diffusers', stars: 23000 },
 { id: 17, owner: 'mlflow', name: 'mlflow', description: '机器学习生命周期管理平台，支持实验跟踪、模型打包和部署。提供统一框架管理 ML 实验、重现和共享。', url: 'https://github.com/mlflow/mlflow', stars: 18000 },
 { id: 18, owner: 'ray-project', name: 'ray', description: '用于扩展 AI 和 Python 应用程序的统一框架，支持分布式训练、推理和服务。提供弹性资源调度和任务编排。', url: 'https://github.com/ray-project/ray', stars: 32000 },
 { id: 19, owner: 'replicate', name: 'cog', description: '用于将机器学习模型打包到容器中并部署的工具。自动生成 Docker 镜像和 API 端点，一键部署到云平台。', url: 'https://github.com/replicate/cog', stars: 7000 },
 { id: 20, owner: 'wandb', name: 'wandb', description: '机器学习实验跟踪和可视化工具，支持协作和结果共享。自动记录超参数、指标、输出，提供云端看板。', url: 'https://github.com/wandb/wandb', stars: 7000 }
 ].map(p => ({ ...p, category: CATEGORIES[p.name] || '其他' }));

 // ================================================================
 // 2. 辅助函数
 // ================================================================
 function formatNum(num) {
 if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
 if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
 return num.toString();
 }

 let toastTimer;

 function showToast(msg) {
 const el = document.getElementById('toast');
 const msgEl = document.getElementById('toastMsg');
 clearTimeout(toastTimer);
 msgEl.textContent = msg;
 el.classList.add('show');
 toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
 }

 // ================================================================
 // 3. 状态管理
 // ================================================================
 const state = {
 currentTab: 'daily',
 page: 1,
 perPage: 10,
 searchQuery: '',
 category: '',
 sortBy: 'tab',
 minimal: false,
 favorites: JSON.parse(localStorage.getItem('aiRankFav') || '[]'),
 theme: localStorage.getItem('aiRankTheme') || 'dark'
 };

 // ================================================================
 // 4. 生成排行数据
 // ================================================================
 const rankCache = {};

 function buildRankData() {
 const dailyList = PROJECTS.map(p => ({
 ...p,
 dailyGrowth: Math.floor(Math.random() * 4900) + 100,
 weeklyGrowth: Math.floor(Math.random() * 18000) + 300,
 monthlyGrowth: Math.floor(Math.random() * 35000) + 800,
 yearlyGrowth: Math.floor(Math.random() * 80000) + 1500
 }));
 const monthlyList = dailyList.map(p => ({
 ...p,
 dailyGrowth: Math.floor(Math.random() * 3000) + 50,
 weeklyGrowth: Math.floor(Math.random() * 12000) + 200,
 monthlyGrowth: Math.floor(Math.random() * 18000) + 1000,
 yearlyGrowth: Math.floor(Math.random() * 60000) + 2000
 }));
 const yearlyList = dailyList.map(p => ({
 ...p,
 dailyGrowth: Math.floor(Math.random() * 2000) + 30,
 weeklyGrowth: Math.floor(Math.random() * 8000) + 100,
 monthlyGrowth: Math.floor(Math.random() * 15000) + 300,
 yearlyGrowth: Math.floor(Math.random() * 100000) + 5000
 }));

 rankCache.daily = dailyList.sort((a,b) => b.dailyGrowth - a.dailyGrowth);
 rankCache.monthly = monthlyList.sort((a,b) => b.monthlyGrowth - a.monthlyGrowth);
 rankCache.yearly = yearlyList.sort((a,b) => b.yearlyGrowth - a.yearlyGrowth);
 }

 // ================================================================
 // 5. 收藏管理
 // ================================================================
 function isFaved(id) { return state.favorites.includes(id); }
 function toggleFav(id) {
 const idx = state.favorites.indexOf(id);
 if (idx > -1) state.favorites.splice(idx, 1);
 else state.favorites.push(id);
 localStorage.setItem('aiRankFav', JSON.stringify(state.favorites));
 updateFavUI();
 renderAll();
 renderFavSidebar();
 }

 function updateFavUI() {
 document.getElementById('favCount').textContent = state.favorites.length;
 }

 function renderFavSidebar() {
 const el = document.getElementById('favList');
 if (state.favorites.length === 0) {
 el.innerHTML = '<div class="empty-fav"><i class="far fa-star" style="font-size:32px;display:block;margin-bottom:12px;opacity:.3"></i>还没有收藏的项目<br>点击卡片右上方 ⭐ 图标收藏</div>';
 return;
 }
 el.innerHTML = state.favorites.map(id => {
 const p = PROJECTS.find(x => x.id === id);
 if (!p) return '';
 return `<div class="fav-item"><i class="fas fa-star" style="color:var(--accent-orange);font-size:12px"></i><a href="${p.url}" target="_blank">${p.owner}/${p.name}</a><span class="remove-fav" data-id="${p.id}"><i class="fas fa-times"></i></span></div>`;
 }).join('');
 el.querySelectorAll('.remove-fav').forEach(btn => {
 btn.addEventListener('click', e => { e.stopPropagation(); toggleFav(+btn.dataset.id); });
 });
 }

 // ================================================================
 // 6. 过滤、排序、分页
 // ================================================================
 function getFilteredData() {
 let data = rankCache[state.currentTab] || [];
 if (state.searchQuery) {
 const q = state.searchQuery.toLowerCase();
 data = data.filter(p => p.owner.toLowerCase().includes(q) || p.name.toLowerCase().includes(q));
 }
 if (state.category) data = data.filter(p => p.category === state.category);

 if (state.sortBy === 'stars') data = [...data].sort((a, b) => b.stars - a.stars);
 else if (state.sortBy === 'daily') data = [...data].sort((a, b) => b.dailyGrowth - a.dailyGrowth);
 else if (state.sortBy === 'monthly') data = [...data].sort((a, b) => b.monthlyGrowth - a.monthlyGrowth);
 else if (state.sortBy === 'yearly') data = [...data].sort((a, b) => b.yearlyGrowth - a.yearlyGrowth);
 return data;
 }

 function getPageData(data) {
 const start = (state.page - 1) * state.perPage;
 return data.slice(start, start + state.perPage);
 }

 // ================================================================
 // 7. 渲染
 // ================================================================
 function renderAll() {
 const allData = getFilteredData();
 const pageData = getPageData(allData);
 renderRankList(state.currentTab, pageData, allData);
 renderPagination(allData.length);
 }

 function renderRankList(tabId, pageData, fullData) {
 const container = document.getElementById(tabId);
 if (!container) return;

 if (pageData.length === 0) {
 const q = state.searchQuery || state.category;
 container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><p>${q ? '没有匹配"'+q+'"的项目' : '暂无数据'}</p></div>`;
 return;
 }

 const trophies = ['🥇', '🥈', '🥉'];
 const growthKeyMap = { daily: 'dailyGrowth', monthly: 'monthlyGrowth', yearly: 'yearlyGrowth' };
 const growthKey = growthKeyMap[tabId] || 'dailyGrowth';
 const tabLabel = { daily: '今日', monthly: '本月', yearly: '年度' };

 // 以全部数据（含未翻页）的最大增长值为 100% 基准
 const maxGrowth = Math.max(...fullData.map(d => d[growthKey] || 1), 1);

 let html = '';

 // 进度条基准说明
 html += `<div class="progress-note">📊 进度条以当前榜单第 1 名 ${tabLabel[tabId]} 增量为 100% 基准</div>`;

 pageData.forEach((item, index) => {
 const rank = (state.page - 1) * state.perPage + index + 1;
 const rankClass = rank <= 3 ? `top${rank}` : 'other';
 const badgeText = rank <= 3 ? `#${rank}` : `#${rank}`;
 const trophyHtml = rank <= 3 ? `<span class="trophy">${trophies[rank-1]}</span>` : '';

 const gVal = item[growthKey] || 0;
 const wVal = item.weeklyGrowth || 0;
 const mVal = item.monthlyGrowth || 0;
 const yVal = item.yearlyGrowth || 0;
 // 进度条：以榜单第 1 的增量为 100%
 const topGrowth = maxGrowth;
 const barPct = Math.min(Math.round((gVal / topGrowth) * 100), 100);
 const barLevel = barPct > 80 ? 5 : barPct > 60 ? 4 : barPct > 40 ? 3 : barPct > 20 ? 2 : 1;

 // 构建增长行：按权重分级
 let growthHtml = '';
 if (tabId === 'daily') {
 growthHtml = `
 <span class="growth-item primary"><i class="fas fa-arrow-up"></i> <span class="val">+${formatNum(gVal)}</span> 今日</span>
 <span class="growth-item secondary"><i class="fas fa-arrow-up"></i> <span class="val">+${formatNum(wVal)}</span> 上周</span>
 <span class="growth-item tertiary"><i class="fas fa-arrow-up"></i> <span class="val">+${formatNum(mVal)}</span> 上月</span>
 <span class="mini-bar-wrap"><span style="font-size:11px;color:var(--text-tertiary);white-space:nowrap">占榜首</span><div class="mini-bar"><div class="fill lv-${barLevel}" style="width:${barPct}%"></div></div><span class="pct-label">${barPct}%</span></span>`;
 } else if (tabId === 'monthly') {
 growthHtml = `
 <span class="growth-item primary"><i class="fas fa-arrow-up"></i> <span class="val">+${formatNum(gVal)}</span> 本月</span>
 <span class="growth-item secondary"><i class="fas fa-arrow-up"></i> <span class="val">+${formatNum(wVal)}</span> 上周</span>
 <span class="growth-item tertiary"><i class="fas fa-calendar-alt"></i> <span class="val">+${formatNum(yVal)}</span> 年度</span>
 <span class="mini-bar-wrap"><span style="font-size:11px;color:var(--text-tertiary);white-space:nowrap">占榜首</span><div class="mini-bar"><div class="fill lv-${barLevel}" style="width:${barPct}%"></div></div><span class="pct-label">${barPct}%</span></span>`;
 } else {
 growthHtml = `
 <span class="growth-item primary"><i class="fas fa-arrow-up"></i> <span class="val">+${formatNum(gVal)}</span> 年度</span>
 <span class="growth-item secondary"><i class="fas fa-arrow-up"></i> <span class="val">+${formatNum(mVal)}</span> 上月</span>
 <span class="growth-item tertiary"><i class="fas fa-calendar-check"></i> <span class="val">+${formatNum(yVal)}</span> 年度</span>
 <span class="mini-bar-wrap"><span style="font-size:11px;color:var(--text-tertiary);white-space:nowrap">占榜首</span><div class="mini-bar"><div class="fill lv-${barLevel}" style="width:${barPct}%"></div></div><span class="pct-label">${barPct}%</span></span>`;
 }

 html += `
 <div class="rank-item" data-id="${item.id}">
 <div class="rank-badge ${rankClass}" data-tooltip="${rank <= 3 ? ['冠军','亚军','季军'][rank-1] : `第 ${rank} 名`}">${trophyHtml}${badgeText}</div>
 <div class="rank-content">
 <div class="project-name">
 <i class="fab fa-github repo-icon"></i>
 <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.owner}/${item.name}</a>
 <a href="${item.url}" target="_blank" class="ext-link" data-tooltip="新标签页打开"><i class="fas fa-external-link-alt"></i></a>
 </div>
 <div class="stars-main">${formatNum(item.stars)} <span class="label">总星标</span></div>
 <div class="growth-row">${growthHtml}</div>
 <div class="project-desc clamped">${item.description}<span class="more-btn" data-id="${item.id}">展开</span></div>
 </div>
 <div class="quick-actions">
 <button class="fav-action ${isFaved(item.id) ? 'faved' : ''}" data-id="${item.id}" data-tooltip="${isFaved(item.id) ? '取消收藏' : '收藏'}"><i class="${isFaved(item.id) ? 'fas' : 'far'} fa-star"></i></button>
 <button class="copy-action" data-repo="${item.owner}/${item.name}" data-tooltip="复制仓库名"><i class="fas fa-copy"></i></button>
 <a href="${item.url}" target="_blank" style="text-decoration:none"><button data-tooltip="跳转 GitHub"><i class="fab fa-github"></i></button></a>
 </div>
 </div>`;
 });

 container.innerHTML = html;

 // 展开
 container.querySelectorAll('.more-btn').forEach(btn => {
 btn.addEventListener('click', function() {
 const desc = this.parentElement;
 desc.classList.toggle('clamped');
 this.textContent = desc.classList.contains('clamped') ? '展开' : '收起';
 });
 });

 // 收藏
 container.querySelectorAll('.fav-action').forEach(btn => {
 btn.addEventListener('click', function() {
 toggleFav(+this.dataset.id);
 });
 });

 // 复制 → Toast
 container.querySelectorAll('.copy-action').forEach(btn => {
 btn.addEventListener('click', async function() {
 try {
 await navigator.clipboard.writeText(this.dataset.repo);
 showToast('✅ 已复制 ' + this.dataset.repo);
 } catch { showToast('复制失败，请手动复制'); }
 });
 });
 }

 // ================================================================
 // 8. 分页
 // ================================================================
 function renderPagination(total) {
 const el = document.getElementById('pagination');
 const totalPages = Math.max(1, Math.ceil(total / state.perPage));
 if (totalPages <= 1) { el.innerHTML = ''; return; }

 let h = `<button ${state.page <= 1 ? 'disabled' : ''} id="pagePrev"><i class="fas fa-chevron-left"></i></button>`;
 for (let i = 1; i <= totalPages; i++) {
 if (i === 1 || i === totalPages || Math.abs(i - state.page) <= 1) {
 h += `<button class="${i === state.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
 } else if (i === state.page - 2 || i === state.page + 2) {
 h += `<span class="page-info">…</span>`;
 }
 }
 h += `<button ${state.page >= totalPages ? 'disabled' : ''} id="pageNext"><i class="fas fa-chevron-right"></i></button>`;
 el.innerHTML = h;

 el.querySelectorAll('[data-page]').forEach(btn => {
 btn.addEventListener('click', () => { state.page = +btn.dataset.page; renderAll(); scrollTo({top:0,behavior:'smooth'}); });
 });
 const goPage = (p) => { if(p>=1&&p<=totalPages){state.page=p;renderAll();scrollTo({top:0,behavior:'smooth'});} };
 const prev = document.getElementById('pagePrev');
 const next = document.getElementById('pageNext');
 if (prev) prev.addEventListener('click', () => goPage(state.page - 1));
 if (next) next.addEventListener('click', () => goPage(state.page + 1));
 }

 // ================================================================
 // 9. 标签切换
 // ================================================================
 function initTabs() {
 document.querySelectorAll('.tab-btn').forEach(btn => {
 btn.addEventListener('click', function() {
 document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
 this.classList.add('active');
 document.querySelectorAll('.rank-list').forEach(p => p.classList.remove('active'));
 state.currentTab = this.dataset.tab;
 state.page = 1;
 document.getElementById(state.currentTab).classList.add('active');
 renderAll();
 });
 });
 }

 // ================================================================
 // 10. 主题切换
 // ================================================================
 function applyTheme(t) {
 document.documentElement.setAttribute('data-theme', t);
 localStorage.setItem('aiRankTheme', t);
 state.theme = t;
 }

 function initTheme() {
 applyTheme(state.theme);
 document.getElementById('themeToggle').addEventListener('click', () => {
 applyTheme(state.theme === 'dark' ? 'light' : 'dark');
 });
 }

 // ================================================================
 // 11. 工具栏
 // ================================================================
 function initToolbar() {
 const searchInput = document.getElementById('searchInput');
 const clearBtn = document.getElementById('clearSearch');
 const catSelect = document.getElementById('categoryFilter');
 const sortSelect = document.getElementById('sortSelect');
 const minimalToggle = document.getElementById('minimalToggle');

 // 搜索
 let searchTimer;
 searchInput.addEventListener('input', function() {
 clearBtn.classList.toggle('show', this.value.length > 0);
 clearTimeout(searchTimer);
 searchTimer = setTimeout(() => {
 state.searchQuery = this.value;
 state.page = 1;
 renderAll();
 }, 250);
 });
 clearBtn.addEventListener('click', function() {
 searchInput.value = '';
 this.classList.remove('show');
 state.searchQuery = '';
 state.page = 1;
 renderAll();
 searchInput.focus();
 });

 // 分类 → 回显选中状态
 catSelect.addEventListener('change', function() {
 state.category = this.value;
 state.page = 1;
 this.classList.toggle('changed', this.value !== '');
 // 把选中的文字回显到按钮——select本身就显示选中项，所以只需颜色变化
 renderAll();
 });

 // 排序 → 回显选中状态
 sortSelect.addEventListener('change', function() {
 state.sortBy = this.value;
 state.page = 1;
 this.classList.toggle('changed', this.value !== 'tab');
 renderAll();
 });

 // 极简模式
 minimalToggle.addEventListener('click', function() {
 state.minimal = !state.minimal;
 this.classList.toggle('active');
 this.querySelector('span').textContent = state.minimal ? '完整' : '极简';
 document.querySelector('.container').classList.toggle('minimal-mode', state.minimal);
 });
 }

 // ================================================================
 // 12. 回到顶部
 // ================================================================
 function initBackTop() {
 const btn = document.getElementById('backTop');
 let ticking = false;
 window.addEventListener('scroll', () => {
 if (!ticking) {
 requestAnimationFrame(() => { btn.classList.toggle('show', window.scrollY > 300); ticking = false; });
 ticking = true;
 }
 });
 btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
 }

 // ================================================================
 // 13. 收藏侧栏
 // ================================================================
 function initFavSidebar() {
 document.getElementById('favBtn').addEventListener('click', openFav);
 document.getElementById('closeFav').addEventListener('click', closeFav);
 document.getElementById('favOverlay').addEventListener('click', closeFav);
 }
 function openFav() { document.getElementById('favSidebar').classList.add('open'); document.getElementById('favOverlay').classList.add('show'); }
 function closeFav() { document.getElementById('favSidebar').classList.remove('open'); document.getElementById('favOverlay').classList.remove('show'); }

 // ================================================================
 // 14. 初始化
 // ================================================================
 buildRankData();
 initTheme();
 initTabs();
 initToolbar();
 initBackTop();
 initFavSidebar();
 renderAll();
 renderFavSidebar();
 updateFavUI();

 const now = new Date();
 document.getElementById('updateTime').textContent =
 `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

 console.log('✅ AI 开源项目排行榜 v3 已加载');
 </script>
</body>
