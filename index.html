<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>GitHub 最佳 AI 开源项目排行榜</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
 <style>
 :root {
 --bg: #0d1117; --bg-card: #161b22; --bg-card-hover: #161b22; --bg-toolbar: #161b22;
 --border: #21262d; --border-hover: #30363d; --text-primary: #f0f6fc; --text-secondary: #b1bac4;
 --text-tertiary: #8b949e; --text-muted: #484f58; --accent-green: #3fb950;
 --accent-orange: #f0883e; --accent-purple: #bc8cff; --accent-blue: #58a6ff;
 --accent-blue-hover: #79c0ff; --tab-bg: #161b22; --tab-active: #238636;
 --tab-active-shadow: rgba(35,134,54,0.35); --shadow: rgba(0,0,0,.4);
 --progress-bg: #21262d; --search-bg: #0d1117; --modal-overlay: rgba(0,0,0,.7);
 --tag-bg: #1c2333; --tag-border: #30363d; --accent-line: #238636;
 --tooltip-bg: #1c2333; --tooltip-border: #30363d; --chart-line: #58a6ff;
 --chart-fill: rgba(88,166,255,.12); --chart-grid: #21262d; --checkbox-bg: #0d1117;
 }
 [data-theme="light"] {
 --bg: #f6f8fa; --bg-card: #fff; --bg-card-hover: #fff; --bg-toolbar: #fff;
 --border: #d0d7de; --border-hover: #afb8c1; --text-primary: #1f2328; --text-secondary: #656d76;
 --text-tertiary: #8c959f; --text-muted: #afb8c1; --accent-green: #1a7f37;
 --accent-orange: #bd561d; --accent-purple: #8250df; --accent-blue: #0969da;
 --accent-blue-hover: #0550ae; --tab-bg: #f6f8fa; --tab-active: #2da44e;
 --tab-active-shadow: rgba(45,164,78,0.25); --shadow: rgba(31,35,40,.12);
 --progress-bg: #d0d7de; --search-bg: #fff; --modal-overlay: rgba(0,0,0,.4);
 --tag-bg: #f6f8fa; --tag-border: #d0d7de; --accent-line: #2da44e;
 --tooltip-bg: #fff; --tooltip-border: #d0d7de; --chart-line: #0969da;
 --chart-fill: rgba(9,105,218,.1); --chart-grid: #d0d7de; --checkbox-bg: #fff;
 }

 *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
 html { scroll-behavior:smooth; }
 body { font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif; background:var(--bg); color:var(--text-primary); min-height:100vh; padding:0; display:flex; justify-content:center; transition:background .3s,color .3s; }
 .container { max-width:1100px; width:100%; padding:24px 16px 80px; }

 /* ===== Header ===== */
 .header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--border); }
 .header-left { display:flex; align-items:center; gap:12px; }
 .header-left .logo { font-size:26px; color:#fff; background:var(--tab-active); width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
 .header-left h1 { font-size:22px; font-weight:700; letter-spacing:-.3px; }
 .header-left h1 .gradient { background:linear-gradient(135deg,var(--text-primary) 0%,var(--text-tertiary) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
 .header-left h1 span { font-weight:300; color:var(--text-tertiary); }
 .theme-toggle { position:relative; width:48px; height:26px; background:var(--toggle-bg, #30363d); border-radius:13px; cursor:pointer; border:1px solid var(--border); transition:background .3s; flex-shrink:0; }
 [data-theme="light"] .theme-toggle { background:#d0d7de; }
 .theme-toggle .knob { position:absolute; top:2px; left:2px; width:20px; height:20px; background:#f0f6fc; border-radius:50%; transition:all .3s; display:flex; align-items:center; justify-content:center; font-size:11px; }
 [data-theme="light"] .theme-toggle .knob { left:24px; background:#1f2328; }
 [data-theme="light"] .theme-toggle .knob .fa-moon { display:none; }
 [data-theme="dark"] .theme-toggle .knob .fa-sun { display:none; }

 /* ===== Data Bar ===== */
 .data-bar { display:flex; align-items:center; gap:16px; margin-bottom:16px; padding:10px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; font-size:12px; color:var(--text-tertiary); flex-wrap:wrap; }
 .data-bar .fresh { display:flex; align-items:center; gap:6px; }
 .data-bar .fresh .green-dot { width:8px; height:8px; border-radius:50%; background:var(--accent-green); animation:pulse-dot 2s ease-in-out infinite; }
 @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
 .data-bar .fresh .label { color:var(--text-secondary); font-weight:600; }
 .data-bar .update-time { margin-left:auto; display:flex; align-items:center; gap:4px; font-size:12px; color:var(--text-tertiary); white-space:nowrap; }
 .data-bar .update-time i { font-size:11px; }
 .data-bar .update-time strong { color:var(--text-secondary); font-weight:500; }

 /* ===== Toolbar ===== */
 .toolbar { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; align-items:center; }
 .toolbar .search-wrap { flex:1; min-width:160px; position:relative; }
 .toolbar .search-wrap input { width:100%; padding:9px 14px 9px 36px; background:var(--search-bg); border:1px solid var(--border); border-radius:10px; color:var(--text-primary); font-size:14px; font-family:inherit; outline:none; transition:border-color .2s; }
 .toolbar .search-wrap input:focus { border-color:var(--accent-blue); }
 .toolbar .search-wrap i.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-tertiary); font-size:14px; pointer-events:none; }
 .toolbar .search-wrap .clear-btn { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text-tertiary); cursor:pointer; font-size:14px; display:none; padding:4px; }
 .toolbar .search-wrap .clear-btn.show { display:block; }
 .toolbar .search-wrap .clear-btn:hover { color:var(--text-primary); }
 .toolbar select { padding:9px 14px; background:var(--search-bg); border:1px solid var(--border); border-radius:10px; color:var(--text-secondary); font-size:13px; font-family:inherit; outline:none; cursor:pointer; min-width:75px; transition:all .2s; appearance:auto; }
 .toolbar select:focus { border-color:var(--accent-blue); }
 .toolbar select.changed { color:var(--text-primary); border-color:var(--accent-blue); }

 /* 高级筛选按钮 */
 .filter-toggle-btn { padding:9px 14px; background:var(--search-bg); border:1px solid var(--border); border-radius:10px; color:var(--text-tertiary); font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap; display:flex; align-items:center; gap:6px; transition:all .2s; }
 .filter-toggle-btn:hover { border-color:var(--border-hover); color:var(--text-secondary); }
 .filter-toggle-btn.active { background:var(--tab-active); color:#fff; border-color:var(--tab-active); }
 .filter-toggle-btn .filter-count { background:rgba(255,255,255,.15); padding:0 7px; border-radius:8px; font-size:11px; }

 .minimal-toggle { padding:9px 14px; background:var(--search-bg); border:1px solid var(--border); border-radius:10px; color:var(--text-tertiary); font-size:13px; cursor:pointer; font-family:inherit; white-space:nowrap; display:flex; align-items:center; gap:6px; transition:all .2s; }
 .minimal-toggle:hover { border-color:var(--border-hover); color:var(--text-secondary); }
 .minimal-toggle.active { background:var(--tab-active); color:#fff; border-color:var(--tab-active); }

 .hist-nav { display:flex; align-items:center; gap:4px; }
 .hist-nav button { padding:7px 10px; background:var(--search-bg); border:1px solid var(--border); border-radius:8px; color:var(--text-tertiary); font-size:12px; cursor:pointer; font-family:inherit; transition:all .15s; white-space:nowrap; }
 .hist-nav button:hover { border-color:var(--border-hover); color:var(--text-secondary); }
 .hist-nav button.active { background:var(--tab-active); color:#fff; border-color:var(--tab-active); }

 /* ===== 高级筛选面板 ===== */
 .filter-panel { display:none; margin-bottom:12px; padding:14px 16px; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; flex-wrap:wrap; gap:16px 24px; animation:fadeUp .25s ease; }
 .filter-panel.open { display:flex; }
 .filter-group { display:flex; flex-direction:column; gap:6px; min-width:120px; }
 .filter-group label { font-size:11px; color:var(--text-tertiary); font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
 .filter-group .chip-group { display:flex; flex-wrap:wrap; gap:4px; }
 .chip { padding:4px 12px; border-radius:20px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-tertiary); font-family:inherit; transition:all .15s; }
 .chip:hover { border-color:var(--border-hover); color:var(--text-secondary); }
 .chip.active { background:var(--tab-active); color:#fff; border-color:var(--tab-active); }
 .chip .chip-count { font-size:10px; opacity:.7; margin-left:3px; }

 /* ===== Tabs ===== */
 .tabs { display:flex; gap:4px; margin-bottom:16px; background:var(--tab-bg); padding:5px; border-radius:12px; border:1px solid var(--border); flex-wrap:wrap; }
 .tab-btn { flex:1; min-width:80px; padding:10px 16px; border:none; border-radius:9px; background:transparent; color:var(--text-tertiary); font-size:14px; font-weight:600; cursor:pointer; transition:all .25s ease; display:flex; align-items:center; justify-content:center; gap:6px; font-family:inherit; }
 .tab-btn:hover { color:var(--text-primary); background:rgba(255,255,255,.04); }
 .tab-btn.active { background:var(--tab-active); color:#fff; box-shadow:0 3px 10px var(--tab-active-shadow); }

 /* ===== Rank List ===== */
 .rank-list { display:none; animation:fadeUp .35s ease; }
 .rank-list.active { display:block; }
 @keyframes fadeUp { 0%{opacity:0;transform:translateY(14px)} 100%{opacity:1;transform:translateY(0)} }

 /* ===== 排名徽章 ===== */
 .rank-badge { width:40px; height:40px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; letter-spacing:-.5px; font-feature-settings:"tnum"; position:relative; }
 .rank-badge.top1 { background:linear-gradient(135deg,#f5a623,#f0883e); color:#fff; }
 .rank-badge.top2 { background:linear-gradient(135deg,#d0d5dc,#b0b8c4); color:#2d3139; }
 .rank-badge.top3 { background:linear-gradient(135deg,#d4a86a,#cd7f32); color:#fff; }
 .rank-badge.other { background:var(--tab-bg); color:var(--text-tertiary); border:1px solid var(--border); border-radius:50%; font-size:16px; }
 .rank-badge .trophy { position:absolute; top:-7px; right:-6px; font-size:13px; }

 .progress-note { font-size:11px; color:var(--text-tertiary); margin-bottom:6px; padding-left:2px; }

 /* ===== 项目卡片 ===== */
 .rank-item { display:flex; gap:14px; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; margin-bottom:10px; transition:all .2s ease; cursor:default; position:relative; box-shadow:0 1px 4px rgba(0,0,0,.15); }
 .rank-item:hover { border-color:var(--border-hover); box-shadow:0 6px 24px var(--shadow); background:linear-gradient(90deg,var(--accent-line) 0px,var(--accent-line) 3px,var(--bg-card) 3px); }
 .rank-item.compare-selected { border-color:var(--accent-blue); box-shadow:0 0 0 1px var(--accent-blue); }
 .rank-content { flex:1; min-width:0; display:flex; flex-direction:column; gap:5px; }

 .project-name { font-size:16px; font-weight:600; color:var(--text-primary); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
 .project-name a { color:var(--accent-blue); text-decoration:none; transition:color .2s; }
 .project-name a:hover { color:var(--accent-blue-hover); text-decoration:underline; }
 .project-name .repo-icon { color:var(--text-tertiary); font-size:14px; }
 .project-name .ext-link { font-size:12px; color:var(--text-tertiary); opacity:.4; transition:opacity .2s; text-decoration:none; }
 .project-name:hover .ext-link { opacity:.85; }
 .project-name .check-wrap { display:inline-flex; align-items:center; }
 .project-name .check-wrap input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color:var(--accent-blue); }

 .stars-main { font-size:26px; font-weight:700; color:var(--accent-orange); line-height:1.1; letter-spacing:-.5px; }
 .stars-main .label { font-size:13px; font-weight:400; color:var(--text-tertiary); margin-left:6px; }

 .growth-row { display:flex; flex-wrap:wrap; align-items:center; gap:4px 18px; }
 .growth-item { display:flex; align-items:center; gap:3px; font-size:13px; color:var(--text-tertiary); }
 .growth-item.primary .val { font-weight:700; color:var(--accent-green); font-size:14px; }
 .growth-item.primary i { color:var(--accent-green); }
 .growth-item.secondary .val { font-weight:500; color:var(--accent-green); opacity:.7; }
 .growth-item.secondary i { color:var(--accent-green); opacity:.6; }
 .growth-item.tertiary .val { font-weight:400; color:var(--text-tertiary); }
 .growth-item.tertiary i { color:var(--text-tertiary); }

 .mini-bar-wrap { flex:1; min-width:70px; max-width:140px; display:flex; align-items:center; gap:4px; }
 .mini-bar { flex:1; height:5px; background:var(--progress-bg); border-radius:3px; overflow:hidden; }
 .mini-bar .fill { height:100%; border-radius:3px; transition:width .6s ease; }
 .mini-bar .fill.lv-1 { background:var(--accent-green); opacity:.35; }
 .mini-bar .fill.lv-2 { background:var(--accent-green); opacity:.55; }
 .mini-bar .fill.lv-3 { background:var(--accent-green); opacity:.75; }
 .mini-bar .fill.lv-4 { background:var(--accent-orange); }
 .mini-bar .fill.lv-5 { background:#e05a30; }
 .mini-bar .pct-label { font-size:11px; color:var(--text-tertiary); white-space:nowrap; min-width:30px; }

 /* ===== Tags ===== */
 .tag-row { display:flex; flex-wrap:wrap; gap:4px; margin-top:1px; }
 .tag { display:inline-flex; align-items:center; gap:3px; font-size:11px; padding:2px 8px; border-radius:12px; background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--text-tertiary); }
 .tag.tag-tech { border-color:var(--accent-blue); color:var(--accent-blue); background:rgba(88,166,255,.06); }
 .tag.tag-scenario { border-color:var(--accent-green); color:var(--accent-green); background:rgba(63,185,80,.06); }
 .tag.tag-feature { border-color:var(--accent-purple); color:var(--accent-purple); background:rgba(188,140,255,.06); }

 /* ===== 黑马/飙升标记 ===== */
 .badge-hot { display:inline-flex; align-items:center; gap:3px; font-size:11px; padding:1px 8px; border-radius:10px; font-weight:600; }
 .badge-hot.fire { background:rgba(240,136,62,.15); color:var(--accent-orange); }
 .badge-hot.new { background:rgba(88,166,255,.15); color:var(--accent-blue); }

 /* ===== Mini Sparkline ===== */
 .spark-wrap { display:inline-flex; align-items:center; gap:4px; cursor:pointer; padding:2px 0; }
 .spark-wrap:hover { opacity:.85; }
 .spark-wrap svg { display:block; }
 .spark-label { font-size:10px; color:var(--text-tertiary); white-space:nowrap; }

 /* ===== 项目描述 ===== */
 .project-desc { font-size:13px; color:var(--text-tertiary); line-height:1.55; overflow:hidden; transition:all .3s ease; }
 .project-desc.clamped { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; }
 .project-desc .more-btn { display:inline; color:var(--accent-blue); cursor:pointer; font-size:12px; font-weight:500; margin-left:6px; border-bottom:1px dashed var(--accent-blue); text-decoration:none; }
 .project-desc .more-btn:hover { color:var(--accent-blue-hover); }

 /* ===== 极简模式 ===== */
 .minimal-mode .stars-main { font-size:20px; }
 .minimal-mode .growth-row { display:none; }
 .minimal-mode .project-desc { display:none; }
 .minimal-mode .project-desc.clamped { display:none; }
 .minimal-mode .mini-bar-wrap { display:none; }
 .minimal-mode .tag-row { display:none; }
 .minimal-mode .progress-note { display:none; }
 .minimal-mode .spark-wrap { display:none; }
 .minimal-mode .badge-hot { display:none; }
 .minimal-mode .rank-item { padding:10px 14px; }
 .minimal-mode .rank-content { gap:2px; }

 /* ===== Quick Actions ===== */
 .quick-actions { position:absolute; top:12px; right:12px; display:flex; gap:3px; opacity:0; transition:opacity .2s; }
 .rank-item:hover .quick-actions { opacity:1; }
 @media(max-width:768px){.quick-actions{opacity:1}}
 .quick-actions button { width:28px; height:28px; border-radius:7px; border:1px solid var(--border); background:var(--bg-card); color:var(--text-tertiary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; transition:all .15s; }
 .quick-actions button:hover { background:var(--bg-card-hover); color:var(--text-primary); border-color:var(--border-hover); }
 .quick-actions button.faved { color:var(--accent-orange); }

 /* ===== Compare Bar ===== */
 .compare-bar { display:none; position:fixed; bottom:0; left:0; right:0; z-index:150; background:var(--bg-card); border-top:1px solid var(--border); padding:12px 24px; align-items:center; justify-content:center; gap:16px; box-shadow:0 -4px 20px var(--shadow); }
 .compare-bar.show { display:flex; }
 .compare-bar .compare-info { font-size:13px; color:var(--text-secondary); }
 .compare-bar .compare-info strong { color:var(--text-primary); }
 .compare-bar button { padding:8px 20px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all .15s; }
 .compare-bar .btn-compare { background:var(--accent-blue); color:#fff; }
 .compare-bar .btn-compare:hover { opacity:.85; }
 .compare-bar .btn-compare:disabled { opacity:.35; cursor:not-allowed; }
 .compare-bar .btn-clear-compare { background:transparent; border:1px solid var(--border); color:var(--text-tertiary); }
 .compare-bar .btn-clear-compare:hover { border-color:var(--border-hover); color:var(--text-secondary); }

 /* ===== Modal ===== */
 .modal-overlay { position:fixed; inset:0; background:var(--modal-overlay); z-index:300; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
 .modal-overlay.show { display:flex; }
 .modal-box { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; width:100%; max-width:820px; max-height:90vh; overflow-y:auto; padding:24px; position:relative; animation:fadeUp .25s ease; }
 .modal-close { position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; border:1px solid var(--border); background:var(--bg-card); color:var(--text-tertiary); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .15s; }
 .modal-close:hover { border-color:var(--border-hover); color:var(--text-primary); }
 .modal-title { font-size:18px; font-weight:600; margin-bottom:16px; }

 /* Chart in modal */
 .chart-container { width:100%; margin:12px 0; position:relative; }
 .chart-container svg { width:100%; height:auto; display:block; }
 .chart-tabs { display:flex; gap:4px; margin-bottom:12px; }
 .chart-tabs button { padding:5px 14px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-tertiary); font-size:12px; cursor:pointer; font-family:inherit; transition:all .15s; }
 .chart-tabs button:hover { border-color:var(--border-hover); color:var(--text-secondary); }
 .chart-tabs button.active { background:var(--tab-active); color:#fff; border-color:var(--tab-active); }
 .chart-stats { display:flex; gap:24px; margin-bottom:12px; flex-wrap:wrap; }
 .chart-stat { font-size:12px; color:var(--text-tertiary); }
 .chart-stat .num { font-weight:600; color:var(--text-primary); font-size:14px; }

 /* Compare table */
 .compare-table { width:100%; border-collapse:collapse; }
 .compare-table th, .compare-table td { padding:10px 14px; text-align:left; font-size:13px; border-bottom:1px solid var(--border); }
 .compare-table th { font-weight:600; color:var(--text-tertiary); font-size:12px; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; width:100px; }
 .compare-table td { color:var(--text-primary); }
 .compare-table .col-stars { color:var(--accent-orange); font-weight:600; }
 .compare-table .col-growth { color:var(--accent-green); font-weight:600; }

 /* ===== Toast ===== */
 .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:10px 22px; font-size:14px; color:var(--text-primary); box-shadow:0 6px 24px var(--shadow); z-index:999; opacity:0; pointer-events:none; transition:all .3s; display:flex; align-items:center; gap:8px; }
 .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
 .toast i { color:var(--accent-green); }

 /* ===== Empty ===== */
 .empty-state { text-align:center; padding:60px 20px; color:var(--text-tertiary); }
 .empty-state i { font-size:48px; margin-bottom:16px; opacity:.4; }
 .empty-state p { font-size:15px; }

 /* ===== Pagination ===== */
 .pagination { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:20px; }
 .pagination button { padding:8px 14px; border:1px solid var(--border); border-radius:8px; background:var(--bg-card); color:var(--text-secondary); cursor:pointer; font-size:13px; font-family:inherit; transition:all .15s; }
 .pagination button:hover:not(:disabled) { background:var(--bg-card-hover); border-color:var(--border-hover); color:var(--text-primary); }
 .pagination button.active { background:var(--tab-active); color:#fff; border-color:var(--tab-active); }
 .pagination button:disabled { opacity:.35; cursor:not-allowed; }
 .pagination .page-info { font-size:13px; color:var(--text-tertiary); margin:0 4px; }

 /* ===== Back to Top ===== */

// ===== 3. 趋势数据生成 =====
function seededRand(seed){
 let s=seed%2147483647;
 if(s<=0)s+=2147483646;
 return function(){s=s*16807%2147483647;return(s-1)/2147483646};
}

function generateTrendData(project,days){
 const rng=seededRand(project.id*9999+12345);
 const baseStar=project.stars;
 const baseGrowth=Math.floor(baseStar*0.00015*365);
 const trend=[];let cur=Math.max(baseStar-baseGrowth,1000);
 const waveAmp=baseGrowth*0.12;const noiseAmp=baseGrowth*0.03;
 for(let i=0;i<days;i++){
  const wave=Math.sin(i/60*Math.PI*2)*(waveAmp*(0.5+rng()));
  const noise=(rng()-0.5)*noiseAmp*2;
  const daily=Math.max(Math.floor(baseGrowth/365+wave+noise),1);
  cur+=daily;
  const d=new Date();d.setDate(d.getDate()-(days-1-i));
  trend.push({date:d.toISOString().slice(0,10),stars:Math.floor(cur)});
 }
 return trend;
}

const TREND_CACHE={};
function getTrendData(pid){

 const p=PROJECTS.find(x=>x.id===pid);
 if(!p){TREND_CACHE[pid]=[];return[]}
 TREND_CACHE[pid]=generateTrendData(p,365);
 return TREND_CACHE[pid];
}

// ===== 5. 排行榜数据生成 =====
const RANK={};
const ALL_HIST={}; // { dateOffset: { daily:[], monthly:[], yearly:[] } }

function genRankData(seed,tab){
 const rng=seededRand(seed+tab.length*777);
 return PROJECTS.map(p=>{
  const base=Math.floor(rng()*4900)+100;
  const daily=tab==='daily'?base:Math.floor(rng()*3000)+50;
  const weekly=Math.floor(rng()*18000)+300;
  const monthly=tab==='monthly'?Math.floor(rng()*18000)+1000:Math.floor(rng()*35000)+800;
  const yearly=tab==='yearly'?Math.floor(rng()*100000)+5000:Math.floor(rng()*80000)+1500;
  return {...p,dailyGrowth:daily,weeklyGrowth:weekly,monthlyGrowth:monthly,yearlyGrowth:yearly};
 }).sort((a,b)=>(tab==='daily'?b.dailyGrowth:tab==='monthly'?b.monthlyGrowth:b.yearlyGrowth)-(tab==='daily'?a.dailyGrowth:tab==='monthly'?a.monthlyGrowth:a.yearlyGrowth));
}

function buildRankData(){
 ['daily','monthly','yearly'].forEach(t=>{RANK[t]=genRankData(20260718,t)});
 // hist offsets: -7, -30, -90 (for dark horse detection)
 [-7,-30,-90].forEach(off=>{
  const sd=20260718+off;
  ALL_HIST[off]={daily:genRankData(sd,'daily'),monthly:genRankData(sd,'monthly'),yearly:genRankData(sd,'yearly')};
 });
}

function getCurrentHis(){
 if(state.historyOffset===0)return RANK;
 const key=ALL_HIST[state.historyOffset];
 if(key)return key;
 return RANK;
}

// ===== 6. 黑马/飙升检测 =====
function detectHotProjects(data,tab){
 const his=ALL_HIST['-7'];
 if(!his||!his[tab])return data.map(()=>({fire:false,newEntry:false,rankUp:0}));
 const currentMap={};data.forEach((p,i)=>{currentMap[p.id]=i});
 const hisData=his[tab];
 const results=data.map((p,i)=>{
  const prevIdx=hisData.findIndex(h=>h.id===p.id);
  let fire=false,newEntry=false,rankUp=0;
  if(prevIdx===-1){newEntry=true;return{fire:false,newEntry,rankUp:0}}
  rankUp=prevIdx-i;
  if(rankUp>=3)fire=true;
  return{fire,newEntry,rankUp};
 });
 return results;
}

// ===== 7. 过滤/排序/分页 =====
function getFilteredData(){
 let data=(getCurrentHis()[state.currentTab]||[]).map(p=>({...p}));
 if(state.historyOffset!==0){
  // regenerate growth for consistency
  data=data.map(p=>({...p,
   dailyGrowth:Math.floor(Math.random()*4900)+100,
   weeklyGrowth:Math.floor(Math.random()*18000)+300,
   monthlyGrowth:Math.floor(Math.random()*35000)+800,
   yearlyGrowth:Math.floor(Math.random()*80000)+1500
  }));
 }
 const q=state.searchQuery.toLowerCase();
 if(q)data=data.filter(p=>p.owner.toLowerCase().includes(q)||p.name.toLowerCase().includes(q));
 if(state.category)data=data.filter(p=>p.category===state.category);

 // advanced filters
 if(state.langFilter.length>0)data=data.filter(p=>state.langFilter.includes(p.language));
 if(state.starFilter.length>0){
  data=data.filter(p=>state.starFilter.some(r=>{
   if(r==='1k-')return p.stars<1000;
   if(r==='1k-10k')return p.stars>=1000&&p.stars<10000;
   if(r==='10k-50k')return p.stars>=10000&&p.stars<50000;
   if(r==='50k-100k')return p.stars>=50000&&p.stars<100000;
   if(r==='100k+')return p.stars>=100000;
   return true;
  }));
 }
 if(state.growthFilter.length>0){
  const gk=state.currentTab==='daily'?'dailyGrowth':state.currentTab==='monthly'?'monthlyGrowth':'yearlyGrowth';
  data=data.filter(p=>state.growthFilter.some(r=>{
   if(r==='low')return p[gk]<500;
   if(r==='medium')return p[gk]>=500&&p[gk]<2000;
   if(r==='high')return p[gk]>=2000&&p[gk]<5000;
   if(r==='super')return p[gk]>=5000;
   return true;
  }));
 }
 if(state.licenseFilter.length>0)data=data.filter(p=>state.licenseFilter.includes(p.license));

 if(state.sortBy==='stars')data.sort((a,b)=>b.stars-a.stars);
 else if(state.sortBy==='daily')data.sort((a,b)=>b.dailyGrowth-a.dailyGrowth);
 else if(state.sortBy==='monthly')data.sort((a,b)=>b.monthlyGrowth-a.monthlyGrowth);
 else if(state.sortBy==='yearly')data.sort((a,b)=>b.yearlyGrowth-a.yearlyGrowth);
 return data;
}
function getPageData(d){const s=(state.page-1)*state.perPage;return d.slice(s,s+state.perPage)}

// ===== 8. 渲染 Sparkline SVG =====
function renderSparklineSVG(pid,days,width,height){
 const d=getTrendData(pid);
 if(d.length===0)return'';
 const slice=d.slice(-days);
 const vals=slice.map(x=>x.stars);
 const min=Math.min(...vals),max=Math.max(...vals);
 const range=Math.max(max-min,1);
 const w=width,h=height;
 const pts=vals.map((v,i)=>({x:i/(vals.length-1)*w,y:h-(v-min)/range*(h-6)-3})).map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
 const fillPts=`0,${h} ${pts} ${w},${h}`;
 const color=window.getComputedStyle(document.documentElement).getPropertyValue('--chart-line').trim()||'#58a6ff';
 const fill=window.getComputedStyle(document.documentElement).getPropertyValue('--chart-fill').trim()||'rgba(88,166,255,.12)';
 return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">
  <defs><linearGradient id="sparkGrad${pid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".25"/><stop offset="100%" stop-color="${color}" stop-opacity=".02"/></linearGradient></defs>
  <polygon points="${fillPts}" fill="url(#sparkGrad${pid})"/>
  <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
 </svg>`;
}

// ===== 10. 分页 =====
function renderPagination(total){
 const el=document.getElementById('pagination');
 const tp=Math.max(1,Math.ceil(total/state.perPage));
 if(tp<=1){el.innerHTML='';return}
 let h=`<button ${state.page<=1?'disabled':''} id="pagePrev"><i class="fas fa-chevron-left"></i></button>`;
 for(let i=1;i<=tp;i++){
  if(i===1||i===tp||Math.abs(i-state.page)<=1)h+=`<button class="${i===state.page?'active':''}" data-page="${i}">${i}</button>`;
  else if(i===state.page-2||i===state.page+2)h+=`<span class="page-info">…</span>`;
 }
 h+=`<button ${state.page>=tp?'disabled':''} id="pageNext"><i class="fas fa-chevron-right"></i></button>`;
 el.innerHTML=h;
 const gp=p=>{if(p>=1&&p<=tp){state.page=p;renderAll();scrollTo({top:0,behavior:'smooth'})}};
 el.querySelectorAll('[data-page]').forEach(b=>{b.addEventListener('click',()=>gp(+b.dataset.page))});
 const pv=document.getElementById('pagePrev'),nx=document.getElementById('pageNext');
 if(pv)pv.addEventListener('click',()=>gp(state.page-1));
 if(nx)nx.addEventListener('click',()=>gp(state.page+1));
}

// ===== 11. 趋势图 Modal =====
function openTrendModal(pid){
 const p=PROJECTS.find(x=>x.id===pid);
 if(!p)return;
 const data=getTrendData(pid);
 if(data.length===0){showToast('暂无趋势数据');return}

 let currentDays=30;
 const modal=document.getElementById('modalOverlay');
 const content=document.getElementById('modalContent');

 function renderChart(days){
  const slice=data.slice(-days);
  const vals=slice.map(x=>x.stars);
  const min=Math.min(...vals),max=Math.max(...vals);
  const range=Math.max(max-min,1);
  const startStar=vals[0],endStar=vals[vals.length-1];
  const totalGrowth=endStar-startStar;
  const avgGrowth=Math.round(totalGrowth/days);
  const chartW=660,chartH=260,padL=50,padR=20,padT=20,padB=40;
  const pw=chartW-padL-padR,ph=chartH-padT-padB;

  // Y axis ticks
  const ySteps=4;const yStepVal=range/ySteps;
  let yAxis='';let gridLines='';
  for(let i=0;i<=ySteps;i++){
   const yv=Math.round(min+i*yStepVal);
   const yPos=padT+ph-(i/ySteps)*ph;
   yAxis+=`<text x="${padL-8}" y="${yPos+4}" text-anchor="end" fill="var(--text-tertiary)" font-size="11">${fmt(yv)}</text>`;
   if(i>0&&i<ySteps)gridLines+=`<line x1="${padL}" y1="${yPos}" x2="${chartW-padR}" y2="${yPos}" stroke="var(--chart-grid)" stroke-width=".5" stroke-dasharray="4,3"/>`;
  }

  // X axis labels (show ~6 points)
  const xLabelCount=6;
  let xAxis='';
  for(let i=0;i<xLabelCount;i++){
   const idx=Math.round(i/(xLabelCount-1)*(vals.length-1));
   const xPos=padL+(idx/(vals.length-1))*pw;
   const d=slice[idx].date.slice(5);
   xAxis+=`<text x="${xPos}" y="${chartH-padB+18}" text-anchor="middle" fill="var(--text-tertiary)" font-size="11">${d}</text>`;
  }

  // Area fill & line
  const pts=vals.map((v,i)=>({x:padL+(i/(vals.length-1))*pw,y:padT+ph-(v-min)/range*ph})).map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const fillPts=`${padL},${padT+ph} ${pts} ${chartW-padR},${padT+ph}`;
  const color=window.getComputedStyle(document.documentElement).getPropertyValue('--chart-line').trim()||'#58a6ff';
  const fill=window.getComputedStyle(document.documentElement).getPropertyValue('--chart-fill').trim()||'rgba(88,166,255,.12)';

  const lastVal=vals[vals.length-1];
  const lastLabelX=padL+(vals.length-1)/(vals.length-1)*pw;
  const lastLabelY=padT+ph-(lastVal-min)/range*ph;

  return `
   <div class="chart-stats">
    <div class="chart-stat">起始 <span class="num">${fmtFull(startStar)}</span></div>
    <div class="chart-stat">最新 <span class="num" style="color:var(--accent-orange)">${fmtFull(endStar)}</span></div>
    <div class="chart-stat">期间增长 <span class="num" style="color:var(--accent-green)">+${fmt(totalGrowth)}</span></div>
    <div class="chart-stat">日均增长 <span class="num" style="color:var(--accent-green)">+${fmtFull(avgGrowth)}</span></div>
   </div>
   <div class="chart-container">
    <svg viewBox="0 0 ${chartW} ${chartH}" style="background:transparent">
     ${gridLines}
     ${yAxis}
     <polygon points="${fillPts}" fill="${fill}"/>
     <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
     <circle cx="${lastLabelX}" cy="${lastLabelY}" r="4" fill="${color}" stroke="var(--bg-card)" stroke-width="2"/>
     ${xAxis}
    </svg>
   </div>`;
 }

 content.innerHTML=`
  <div class="modal-title"><i class="fab fa-github"></i> ${p.owner}/${p.name} 趋势图</div>
  <div class="chart-tabs" id="chartTabs">
   <button data-days="30" class="active">30 天</button>
   <button data-days="90">90 天</button>
   <button data-days="365">1 年</button>
  </div>
  <div id="chartArea">${renderChart(30)}</div>
  <div style="margin-top:14px;font-size:12px;color:var(--text-tertiary)">基于模拟数据生成，展示近 <span id="chartDaysLabel">30</span> 天增长趋势</div>`;

 modal.classList.add('show');

 setTimeout(()=>{
  document.getElementById('chartTabs').addEventListener('click',function(e){
   const btn=e.target.closest('button');
   if(!btn||!btn.dataset.days)return;
   document.querySelectorAll('#chartTabs button').forEach(b=>b.classList.remove('active'));
   btn.classList.add('active');
   currentDays=+btn.dataset.days;
   document.getElementById('chartArea').innerHTML=renderChart(currentDays);
   document.getElementById('chartDaysLabel').textContent=currentDays;
  });
 },50);
}

   this.classList.add('active');
   document.querySelectorAll('.rank-list').forEach(p=>p.classList.remove('active'));
   state.currentTab=this.dataset.tab;state.page=1;
   document.getElementById(state.currentTab).classList.add('active');
   renderAll();
  });
 });
}

// ===== 14. 主题 =====
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('aiRankTheme',t);state.theme=t}
function initTheme(){applyTheme(state.theme);document.getElementById('themeToggle').addEventListener('click',()=>applyTheme(state.theme==='dark'?'light':'dark'))}

// ===== 15. 工具栏 =====
function initToolbar(){
 const si=document.getElementById('searchInput'),cl=document.getElementById('clearSearch');
 const cf=document.getElementById('categoryFilter'),ss=document.getElementById('sortSelect');
 const mt=document.getElementById('minimalToggle');
 let st;
 si.addEventListener('input',function(){cl.classList.toggle('show',this.value.length>0);clearTimeout(st);st=setTimeout(()=>{state.searchQuery=this.value;state.page=1;renderAll()},250)});
 cl.addEventListener('click',function(){si.value='';this.classList.remove('show');state.searchQuery='';state.page=1;renderAll();si.focus()});
 cf.addEventListener('change',function(){state.category=this.value;state.page=1;this.classList.toggle('changed',this.value!=='');renderAll()});
 ss.addEventListener('change',function(){state.sortBy=this.value;state.page=1;this.classList.toggle('changed',this.value!=='tab');renderAll()});
 mt.addEventListener('click',function(){state.minimal=!state.minimal;this.classList.toggle('active');this.querySelector('span').textContent=state.minimal?'完整':'极简';document.querySelector('.container').classList.toggle('minimal-mode',state.minimal)});

 // 高级筛选面板 toggle
 const ft=document.getElementById('filterToggle');
 ft.addEventListener('click',function(){document.getElementById('filterPanel').classList.toggle('open');this.classList.toggle('active')});

 // 历史日期
 document.querySelectorAll('[data-hist]').forEach(btn=>{
  btn.addEventListener('click',function(){
   document.querySelectorAll('[data-hist]').forEach(b=>b.classList.remove('active'));
   this.classList.add('active');
   const v=this.dataset.hist;
   state.historyOffset=v==='today'?0:parseInt(v);
   state.page=1;
   renderAll();
  });
 });
}

// ===== 16. 高级筛选芯片 =====
function buildFilterChips(){
 const langs=[...new Set(PROJECTS.map(p=>p.language))].sort();
 const stars=[{v:'1k-',l:'<1k'},{v:'1k-10k',l:'1k~10k'},{v:'10k-50k',l:'10k~50k'},{v:'50k-100k',l:'50k~100k'},{v:'100k+',l:'100k+'}];
 const growths=[{v:'low',l:'<500'},{v:'medium',l:'500~2k'},{v:'high',l:'2k~5k'},{v:'super',l:'5k+'}];
 const licenses=[...new Set(PROJECTS.map(p=>p.license))].sort();

 function buildChipGroup(containerId,items,stateKey,fkey){
  const el=document.getElementById(containerId);
  if(!el)return;
  el.innerHTML=items.map(({v,l})=>`<button class="chip${state[fkey].includes(v)?' active':''}" data-value="${v}" data-state="${fkey}">${l}</button>`).join('');
  el.addEventListener('click',function(e){
   const btn=e.target.closest('.chip');
   if(!btn)return;
   const v=btn.dataset.value,sk=btn.dataset.state;
   const idx=state[sk].indexOf(v);
   if(idx>-1)state[sk].splice(idx,1);else state[sk].push(v);
   btn.classList.toggle('active');
   updateFilterCount();
   state.page=1;renderAll();
  });
 }

 buildChipGroup('langFilter',langs.map(l=>({v:l,l})),'langFilter','langFilter');
 buildChipGroup('starFilter',stars,'starFilter','starFilter');
 buildChipGroup('growthFilter',growths,'growthFilter','growthFilter');
 buildChipGroup('licenseFilter',licenses.map(l=>({v:l,l})),'licenseFilter','licenseFilter');
}

function updateFilterCount(){
 const total=state.langFilter.length+state.starFilter.length+state.growthFilter.length+state.licenseFilter.length;
 document.getElementById('filterCount').textContent=total;
}

// ===== 17. 收藏 =====
function isFaved(id){return state.favorites.includes(id)}
function toggleFav(id){
 const idx=state.favorites.indexOf(id);
 if(idx>-1)state.favorites.splice(idx,1);else state.favorites.push(id);
 localStorage.setItem('aiRankFav',JSON.stringify(state.favorites));
 updateFavUI();renderAll();renderFavSidebar();
}
function updateFavUI(){document.getElementById('favCount').textContent=state.favorites.length}
function renderFavSidebar(){
 const el=document.getElementById('favList');
 if(state.favorites.length===0){el.innerHTML='<div class="empty-fav"><i class="far fa-star" style="font-size:32px;display:block;margin-bottom:12px;opacity:.3"></i>还没有收藏的项目</div>';return}
 el.innerHTML=state.favorites.map(id=>{const p=PROJECTS.find(x=>x.id===id);if(!p)return '';return `<div class="fav-item"><i class="fas fa-star" style="color:var(--accent-orange);font-size:12px"></i><a href="${p.url}" target="_blank">${p.owner}/${p.name}</a><span class="remove-fav" data-id="${p.id}"><i class="fas fa-times"></i></span></div>`}).join('');
 el.querySelectorAll('.remove-fav').forEach(btn=>{btn.addEventListener('click',e=>{e.stopPropagation();toggleFav(+btn.dataset.id)})});
}
function initFav(){
 document.getElementById('favBtn').addEventListener('click',()=>{document.getElementById('favSidebar').classList.add('open');document.getElementById('favOverlay').classList.add('show')});
 document.getElementById('closeFav').addEventListener('click',()=>{document.getElementById('favSidebar').classList.remove('open');document.getElementById('favOverlay').classList.remove('show')});
 document.getElementById('favOverlay').addEventListener('click',()=>{document.getElementById('favSidebar').classList.remove('open');document.getElementById('favOverlay').classList.remove('show')});
}

// ===== 18. Compare Bar =====
function updateCompareBar(){
 const bar=document.getElementById('compareBar');
 const count=document.getElementById('compareCount');
 const btn=document.getElementById('btnCompare');
 count.textContent=state.compareIds.length;
 if(state.compareIds.length>=1)bar.classList.add('show');else bar.classList.remove('show');
 btn.disabled=state.compareIds.length<2;
}
function initCompare(){
 document.getElementById('btnCompare').addEventListener('click',openCompareModal);
 document.getElementById('btnClearCompare').addEventListener('click',()=>{state.compareIds=[];updateCompareBar();renderAll()});
}

// ===== 19. Back to Top =====
function initBackTop(){
 const btn=document.getElementById('backTop');
 let t=false;
 window.addEventListener('scroll',()=>{if(!t){requestAnimationFrame(()=>{btn.classList.toggle('show',window.scrollY>300);t=false});t=true}});
 btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
}

// ===== 20. Modal =====
function initModal(){
 document.getElementById('modalClose').addEventListener('click',()=>document.getElementById('modalOverlay').classList.remove('show'));
 document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});
}

// ===== 21. 初始化 =====
buildRankData();
initTheme();
initTabs();
initToolbar();
buildFilterChips();
initFav();
initCompare();
initBackTop();
initModal();
renderAll();
renderFavSidebar();
updateFavUI();

 `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
