 <style>
 /* ===== 全局重置 & 字体 ===== */
 * {

 box-sizing: border-box;
 }

 body {

 }

 .container {

 }

 /* ===== 头部 ===== */
 .header {

 }

 }

 }

 }

 /* ===== 标签页导航 ===== */
 .tabs {

 padding: 6px;

 border: 1px solid #21262d;

 }

 .tab-btn {

 }

 }

 }

 }

 .tab-btn .badge {
 background: rgba(255, 255, 255, 0.15);

 border-radius: 12px;
 font-size: 12px;
 font-weight: 500;
 }

 .tab-btn.active .badge {
 background: rgba(255, 255, 255, 0.2);
 }

 /* ===== 排行榜列表 ===== */
 .rank-list {
 display: none;
 animation: fadeUp 0.4s ease;
 }

 .rank-list.active {
 display: block;
 }

 @keyframes fadeUp {
 0% {
 opacity: 0;
 transform: translateY(16px);
 }
 100% {
 opacity: 1;
 transform: translateY(0);
 }
 }

 /* ===== 项目卡片 ===== */

 display: flex;
 align-items: stretch;
 background: #161b22;
 border: 1px solid #21262d;
 border-radius: 14px;
 padding: 18px 20px;
 margin-bottom: 12px;

 gap: 16px;
 }

 .rank-item:hover {
 border-color: #30363d;
 background: #1c2333;
 transform: translateY(-2px);
 box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
 }

 font-size: 22px;

 </style>

<body>

 <script>
 // ================================================================

 const PROJECTS = [{

 id: 20,

 url: 'https://github.com/wandb/wandb',
 stars: 7000,
 }];

 // ================================================================
 // 2. 生成排行数据（日 / 月 / 年）
 // ================================================================

 function buildRankData() {
 const base = PROJECTS.map(p => ({ ...p }));

 // 为每个项目生成三个维度的增长数据
 const dailyList = base.map(p => {
 const d = Math.floor(Math.random() * 4900) + 100;
 const w = Math.floor(d * (3 + Math.random() * 5));
 const m = Math.floor(d * (10 + Math.random() * 18));
 return { ...p, dailyGrowth: d, weeklyGrowth: w, monthlyGrowth: m };
 });

 const monthlyList = dailyList.map(p => {
 const m = Math.floor(Math.random() * 12000) + 800;
 return {
 ...p,
 dailyGrowth: Math.floor(Math.random() * 3000) + 50,
 weeklyGrowth: Math.floor(Math.random() * 8000) + 200,
 monthlyGrowth: m,
 };
 });

 const yearlyList = dailyList.map(p => {
 const y = Math.floor(Math.random() * 25000) + 1500;
 return {
 ...p,
 dailyGrowth: Math.floor(Math.random() * 2000) + 30,
 weeklyGrowth: Math.floor(Math.random() * 5000) + 100,
 monthlyGrowth: Math.floor(Math.random() * 10000) + 300,
 yearlyGrowth: y,
 };
 });

 const dailyRank = [...dailyList].sort((a, b) => b.dailyGrowth - a.dailyGrowth).slice(0, 10);
 const monthlyRank = [...monthlyList].sort((a, b) => b.monthlyGrowth - a.monthlyGrowth).slice(0, 10);
 const yearlyRank = [...yearlyList].map(p => {
 const y = Math.floor(p.monthlyGrowth * (3 + Math.random() * 4));
 return { ...p, yearlyGrowth: y };
 }).sort((a, b) => b.yearlyGrowth - a.yearlyGrowth).slice(0, 10);

 const formatStars = (num) => {
 if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
 if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
 return num.toString();
 };
 const formatGrowth = (num) => {
 if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
 return num.toString();
 };

 const processItem = (item, growthKey, extraFields = {}) => {
 const growth = item[growthKey] || 0;
 return {
 ...item,
 displayStars: formatStars(item.stars),
 displayGrowth: formatGrowth(growth),
 growthValue: growth,
 ...extraFields,
 };
 };

 return {
 daily: dailyRank.map(item => processItem(item, 'dailyGrowth', { rankType: 'daily' })),
 monthly: monthlyRank.map(item => processItem(item, 'monthlyGrowth', { rankType: 'monthly' })),
 yearly: yearlyRank.map(item => processItem(item, 'yearlyGrowth', { rankType: 'yearly' })),
 };
 }

 // ================================================================
 // 3. 渲染函数
 // ================================================================

 function renderRankList(containerId, data, rankType) {
 const container = document.getElementById(containerId);
 if (!container) return;
 if (!data || data.length === 0) {
 container.innerHTML = `<div style="text-align:center;padding:40px;color:#8b949e;">暂无数据</div>`;
 return;
 }

 const rankEmojis = ['🥇', '🥈', '🥉'];
 let html = '';
 data.forEach((item, index) => {
 const rank = index + 1;
 const rankClass = rank <= 3 ? `top${rank}` : '';
 const emoji = rank <= 3 ? rankEmojis[rank - 1] : `#${rank}`;

 let metricsHtml = `
 <div class="metric">
 <i class="fas fa-star" style="color:#f0883e;"></i>
 <span class="value">${item.displayStars}</span>
 <span style="color:#8b949e;font-size:12px;">总星标</span>
 </div>
 <div class="metric">
 <i class="fas fa-arrow-up trend-up"></i>
 <span class="value green">+${item.displayGrowth}</span>
 <span style="color:#8b949e;font-size:12px;">${rankType === 'daily' ? '今日' : rankType === 'monthly' ? '本月' : '年度'}</span>
 </div>
 `;

 if (rankType === 'daily') {
 const weekVal = item.weeklyGrowth || 0;
 const weekDisplay = weekVal >= 1000 ? (weekVal / 1000).toFixed(1) + 'k' : weekVal.toString();
 metricsHtml += `
 <div class="metric">
 <i class="fas fa-arrow-up trend-up"></i>
 <span class="value green">+${weekDisplay}</span>
 <span style="color:#8b949e;font-size:12px;">上周</span>
 </div>
 <div class="metric">
 <i class="fas fa-arrow-up trend-up"></i>
 <span class="value green">+${item.displayGrowth}</span>
 <span style="color:#8b949e;font-size:12px;">上月</span>
 </div>
 `;
 } else if (rankType === 'monthly') {
 const weekVal = item.weeklyGrowth || 0;
 const weekDisplay = weekVal >= 1000 ? (weekVal / 1000).toFixed(1) + 'k' : weekVal.toString();
 metricsHtml += `
 <div class="metric">
 <i class="fas fa-arrow-up trend-up"></i>
 <span class="value green">+${weekDisplay}</span>
 <span style="color:#8b949e;font-size:12px;">上周</span>
 </div>
 <div class="metric">
 <i class="fas fa-calendar-alt" style="color:#bc8cff;"></i>
 <span class="value purple">+${item.displayGrowth}</span>
 <span style="color:#8b949e;font-size:12px;">本月</span>
 </div>
 `;
 } else if (rankType === 'yearly') {
 const monthVal = item.monthlyGrowth || 0;
 const monthDisplay = monthVal >= 1000 ? (monthVal / 1000).toFixed(1) + 'k' : monthVal.toString();
 metricsHtml += `
 <div class="metric">
 <i class="fas fa-arrow-up trend-up"></i>
 <span class="value green">+${monthDisplay}</span>
 <span style="color:#8b949e;font-size:12px;">上月</span>
 </div>
 <div class="metric">
 <i class="fas fa-calendar-check" style="color:#bc8cff;"></i>
 <span class="value purple">+${item.displayGrowth}</span>
 <span style="color:#8b949e;font-size:12px;">年度</span>
 </div>
 `;
 }

 html += `
 <div class="rank-item">
 <div class="rank-number ${rankClass}">${emoji}</div>
 <div class="rank-content">
 <div class="project-name">
 <i class="fab fa-github repo-icon"></i>
 <a href="${item.url}" target="_blank" rel="noopener noreferrer">
 ${item.owner}/${item.name}
 </a>
 <span class="stars-badge">
 <i class="fas fa-star"></i> ${item.displayStars}
 </span>
 </div>
 <div class="project-desc">${item.description}</div>
 <div class="metrics">
 ${metricsHtml}
 </div>
 </div>
 </div>
 `;
 });

 container.innerHTML = html;
 }

 // ================================================================
 // 4. 初始化 & 标签切换
 // ================================================================

 const rankData = buildRankData();

 renderRankList('daily', rankData.daily, 'daily');
 renderRankList('monthly', rankData.monthly, 'monthly');
 renderRankList('yearly', rankData.yearly, 'yearly');

 const tabs = document.querySelectorAll('.tab-btn');
 const panels = {
 daily: document.getElementById('daily'),
 monthly: document.getElementById('monthly'),
 yearly: document.getElementById('yearly'),
 };

 tabs.forEach(btn => {
 btn.addEventListener('click', function() {
 tabs.forEach(b => b.classList.remove('active'));
 this.classList.add('active');
 Object.values(panels).forEach(p => p.classList.remove('active'));
 const tabId = this.dataset.tab;
 if (panels[tabId]) panels[tabId].classList.add('active');
 });
 });

 // 更新时间
 const now = new Date();
 const timeStr =
